<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>TOWER — CoachAI</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230B0F17'/%3E%3Cpath d='M9 9h3v3h2V9h4v3h2V9h3v5l-2 2v7l2 2v1H9v-1l2-2v-7l-2-2V9z' fill='%235B8DEF'/%3E%3C/svg%3E">

  <!-- Defense against leaked service workers from the main CoachAI app.
       Tower must never be served from a cached SW (or it would serve the
       wrong HTML). Runs synchronously before anything else paints. -->
  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;
      try {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          var killed = false;
          regs.forEach(function(r){ r.unregister(); killed = true; });
          if (killed && window.caches && caches.keys) {
            caches.keys().then(function(keys){
              keys.forEach(function(k){ caches.delete(k); });
              // If a SW had hijacked us, the current document may be stale.
              // Reload once (without query loop) to get fresh content.
              if (!sessionStorage.getItem('tower.swPurged')) {
                sessionStorage.setItem('tower.swPurged', '1');
                location.replace(location.pathname);
              }
            });
          }
        });
      } catch(_){}
    })();
  </script>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

  <style>
    /* ---------- THEME TOKENS ---------- */
    :root[data-theme="dark"] {
      --bg:           #0B0F17;
      --bg-elev:      #141A24;
      --bg-elev-2:    #1C2330;
      --border:       #2A3441;
      --border-soft:  #1F2733;
      --text:         #E8ECF3;
      --text-muted:   #8B95A7;
      --text-dim:     #4A5468;
      --accent:       #5B8DEF;
      --accent-hover: #7AA3F5;
      --accent-soft:  rgba(91, 141, 239, 0.12);
      --danger:       #EF4444;
      --warning:      #F59E0B;
      --success:      #22C55E;
      --neutral:      #6B7280;
      --shadow-card:  none;
      --input-bg:     #0F141D;
    }
    :root[data-theme="light"] {
      --bg:           #F6F8FB;
      --bg-elev:      #FFFFFF;
      --bg-elev-2:    #F0F3F8;
      --border:       #DCE2EA;
      --border-soft:  #E8EDF3;
      --text:         #121821;
      --text-muted:   #5C6877;
      --text-dim:     #9BA6B5;
      --accent:       #2563EB;
      --accent-hover: #1D4ED8;
      --accent-soft:  rgba(37, 99, 235, 0.10);
      --danger:       #DC2626;
      --warning:      #D97706;
      --success:      #16A34A;
      --neutral:      #6B7280;
      --shadow-card:  0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
      --input-bg:     #FFFFFF;
    }

    /* ---------- RESET / BASE ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.45;
    }
    .mono {
      font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    button { font: inherit; cursor: pointer; }

    /* ---------- LOGIN ---------- */
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: var(--shadow-card);
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .login-brand svg { width: 28px; height: 28px; color: var(--accent); }
    .login-brand .wm {
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 15px;
    }
    .login-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 600;
    }
    .login-sub {
      margin: 0 0 24px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      display: none;
    }
    .login-error.show { display: block; }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .theme-toggle-floating {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-toggle-floating:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-toggle-floating svg { width: 16px; height: 16px; }

    /* ---------- APP SHELL ---------- */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--bg-elev);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px 20px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 16px;
    }
    .sidebar-brand svg { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; }
    .sidebar-brand .wm {
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 13px;
    }
    .nav-section {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 14px 10px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover {
      background: var(--bg-elev-2);
      color: var(--text);
    }
    .nav-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-foot {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
    }
    .sidebar-foot .name {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      transition: background 0.12s, color 0.12s;
    }
    .icon-btn:hover { background: var(--bg-elev-2); color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar {
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .crumb {
      font-size: 13px;
      color: var(--text-muted);
    }
    .crumb strong {
      color: var(--text);
      font-weight: 500;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .content {
      padding: 28px 32px;
      overflow-y: auto;
    }
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .page-sub {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .placeholder {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 60px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      background: var(--bg-elev);
    }
    .placeholder strong {
      display: block;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: var(--shadow-card);
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }
    .stat-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ---------- TRAFFIC LIGHT ---------- */
    .tl {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .tl-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-green  .tl-dot { background: var(--success); box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
    .tl-yellow .tl-dot { background: var(--warning); box-shadow: 0 0 6px rgba(245, 158, 11, 0.5); }
    .tl-red    .tl-dot { background: var(--danger);  box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }
    .tl-gray   .tl-dot { background: var(--neutral); }

    /* ---------- UTILS ---------- */
    .hidden { display: none !important; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* boot loader */
    .boot {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    /* ---------- TABLES ---------- */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
    }
    .data-table tbody td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr {
      cursor: default;
      transition: background 0.1s;
    }
    .data-table tbody tr.clickable { cursor: pointer; }
    .data-table tbody tr.clickable:hover { background: var(--bg-elev-2); }
    .data-table .cell-mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 12px; }
    .data-table .cell-dim  { color: var(--text-dim); }
    .data-table .cell-right { text-align: right; }
    .table-wrap { overflow-x: auto; }

    /* ---------- BADGES ---------- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--bg-elev-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .badge-accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
    .badge-success { background: rgba(34,197,94,0.12); color: var(--success); border-color: transparent; }
    .badge-warning { background: rgba(245,158,11,0.12); color: var(--warning); border-color: transparent; }
    .badge-danger  { background: rgba(239,68,68,0.12);  color: var(--danger);  border-color: transparent; }

    /* ---------- BUTTONS ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { background: var(--bg-elev-2); border-color: var(--text-muted); }
    .btn-primary-sm {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary-sm:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-danger-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--danger);
      padding: 4px 8px;
    }
    .btn-danger-ghost:hover { background: rgba(239,68,68,0.10); }
    .btn-back {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 4px 0;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }
    .btn-back:hover { color: var(--text); }

    /* ---------- MODAL ---------- */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      display: grid; place-items: center;
      z-index: 100;
    }
    :root[data-theme="light"] .modal-backdrop { background: rgba(15,23,42,0.35); }
    .modal {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal h2 {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 600;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .field select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
    }
    .field textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ---------- DRILL HEADER ---------- */
    .drill-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .drill-title { display: flex; align-items: center; gap: 10px; }
    .drill-title .swatch {
      width: 28px; height: 28px; border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-row strong { color: var(--text); font-weight: 500; }

    /* ---------- BUGS DETAIL ---------- */
    .bug-item {
      padding: 10px 12px;
      background: rgba(239,68,68,0.05);
      border-left: 2px solid var(--danger);
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .bug-item .bug-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ---------- EMPTY STATE ---------- */
    .empty-row {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ---------- TOAST ---------- */
    .toast-stack {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }
    .toast {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      animation: slideIn 0.2s ease-out;
    }
    .toast-error { border-color: var(--danger); color: var(--danger); }
    .toast-success { border-color: var(--success); color: var(--success); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(8px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <!-- Boot loader (shown until /me responds) -->
  <div id="boot" class="boot">
    <div><span class="spinner"></span> &nbsp; TOWER</div>
  </div>

  <!-- Login screen -->
  <div id="login" class="login-wrap hidden">
    <button id="loginThemeToggle" class="theme-toggle-floating" title="Cambiar tema" aria-label="Cambiar tema">
      <svg id="loginThemeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
    </button>

    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="login-brand">
        <!-- Chess rook icon -->
        <svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
          <path d="M9 9h3v3h2V9h4v3h2V9h3v5l-2 2v7l2 2v1H9v-1l2-2v-7l-2-2V9z"/>
        </svg>
        <span class="wm">TOWER</span>
      </div>

      <h1 class="login-title">Acceso privado</h1>
      <p class="login-sub">Panel de control de CoachAI Pro.</p>

      <div class="field">
        <label for="loginUser">Usuario</label>
        <input id="loginUser" name="username" type="text" autocomplete="username" autocapitalize="off" spellcheck="false" required>
      </div>
      <div class="field">
        <label for="loginPass">Contraseña</label>
        <input id="loginPass" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button type="submit" id="loginSubmit" class="btn-primary">Ingresar</button>

      <div id="loginError" class="login-error"></div>

      <div class="login-footer">COACHAI · TOWER · v0.2</div>
    </form>
  </div>

  <!-- App shell -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
          <path d="M9 9h3v3h2V9h4v3h2V9h3v5l-2 2v7l2 2v1H9v-1l2-2v-7l-2-2V9z"/>
        </svg>
        <span class="wm">TOWER</span>
      </div>

      <div class="nav-section">General</div>
      <div class="nav-item active" data-route="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>
        Dashboard
      </div>
      <div class="nav-item" data-route="tenants">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V8l9-5 9 5v13"></path><path d="M9 21v-6h6v6"></path></svg>
        Tenants
      </div>
      <div class="nav-item" data-route="users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Usuarios
      </div>

      <div class="nav-section">Negocio</div>
      <div class="nav-item" data-route="financiero">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Financiero
      </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        API / Costos
      </div>

      <div class="nav-section">Sistema</div>
      <div class="nav-item" data-route="logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="13" y2="17"></line></svg>
        Logs
      </div>
      <div class="nav-item" data-route="config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        Configuración
      </div>

      <div class="sidebar-foot">
        <div id="userAvatar" class="avatar">?</div>
        <div id="userName" class="name">—</div>
        <button id="themeToggle" class="icon-btn" title="Cambiar tema" aria-label="Cambiar tema">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
        </button>
        <button id="logoutBtn" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </div>
    </aside>

    <section class="main">
      <header class="topbar">
        <div id="crumb" class="crumb"><strong>Dashboard</strong></div>
        <div class="topbar-actions">
          <span class="tl tl-gray" title="Estado del sistema"><span class="tl-dot"></span><span class="mono">v0.2</span></span>
        </div>
      </header>

      <main id="content" class="content">
        <!-- Routed content -->
      </main>
    </section>
  </div>

  <script>
  (() => {
    // ---------- Theme ----------
    const THEME_KEY = 'tower.theme';
    const root = document.documentElement;
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      try { localStorage.setItem(THEME_KEY, t); } catch {}
      updateThemeIcons(t);
    }
    function updateThemeIcons(t) {
      const moon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
      const sun  = `<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>`;
      const svg = t === 'dark' ? sun : moon;
      const a = document.getElementById('themeIcon');
      const b = document.getElementById('loginThemeIcon');
      if (a) a.innerHTML = svg;
      if (b) b.innerHTML = svg;
    }
    function toggleTheme() {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    }
    function initTheme() {
      let t = null;
      try { t = localStorage.getItem(THEME_KEY); } catch {}
      if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      applyTheme(t);
    }
    initTheme();

    document.addEventListener('click', (e) => {
      const tt = e.target.closest('#themeToggle, #loginThemeToggle');
      if (tt) { e.preventDefault(); toggleTheme(); }
    });

    // ---------- DOM refs ----------
    const $ = (sel) => document.querySelector(sel);
    const boot = $('#boot');
    const loginEl = $('#login');
    const appEl = $('#app');
    const loginForm = $('#loginForm');
    const loginError = $('#loginError');
    const loginSubmit = $('#loginSubmit');
    const userAvatar = $('#userAvatar');
    const userName = $('#userName');
    const contentEl = $('#content');
    const crumbEl = $('#crumb');
    const logoutBtn = $('#logoutBtn');

    // ---------- Auth flow ----------
    let session = null;

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        ...opts,
      });
      let data = null;
      try { data = await res.json(); } catch {}
      return { ok: res.ok, status: res.status, data };
    }

    function showError(msg) {
      loginError.textContent = msg;
      loginError.classList.add('show');
    }
    function clearError() {
      loginError.textContent = '';
      loginError.classList.remove('show');
    }

    async function checkSession() {
      const { ok, data } = await api('/api/tower/me');
      if (ok && data && data.ok) {
        session = data.user;
        enterApp();
      } else {
        showLogin();
      }
    }

    function showLogin() {
      boot.classList.add('hidden');
      appEl.classList.add('hidden');
      loginEl.classList.remove('hidden');
      setTimeout(() => $('#loginUser')?.focus(), 50);
    }

    function enterApp() {
      boot.classList.add('hidden');
      loginEl.classList.add('hidden');
      appEl.classList.remove('hidden');
      userName.textContent = session.displayName || session.username;
      userAvatar.textContent = (session.displayName || session.username || '?').charAt(0).toUpperCase();
      route('dashboard');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const username = $('#loginUser').value.trim();
      const password = $('#loginPass').value;
      if (!username || !password) { showError('Completá usuario y contraseña.'); return; }
      loginSubmit.disabled = true;
      loginSubmit.innerHTML = '<span class="spinner"></span> Verificando...';
      const { ok, status, data } = await api('/api/tower/login', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });
      loginSubmit.disabled = false;
      loginSubmit.textContent = 'Ingresar';
      if (ok && data && data.ok) {
        session = data.user;
        $('#loginPass').value = '';
        enterApp();
      } else if (status === 401) {
        showError('Usuario o contraseña incorrectos.');
      } else {
        showError('No se pudo iniciar sesión. Probá de nuevo.');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await api('/api/tower/logout', { method: 'POST' });
      session = null;
      showLogin();
    });

    // ---------- Utilities ----------
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function fmtUsd(n) {
      const v = Number(n || 0);
      return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function fmtInt(n) {
      return Number(n || 0).toLocaleString('en-US');
    }
    function fmtRelative(iso) {
      if (!iso) return '—';
      const t = new Date(iso).getTime();
      if (!Number.isFinite(t)) return '—';
      const diff = Date.now() - t;
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return 'hace ' + sec + 's';
      const min = Math.floor(sec / 60);
      if (min < 60) return 'hace ' + min + ' min';
      const hr = Math.floor(min / 60);
      if (hr < 24) return 'hace ' + hr + ' h';
      const d = Math.floor(hr / 24);
      if (d < 30) return 'hace ' + d + ' d';
      const mo = Math.floor(d / 30);
      if (mo < 12) return 'hace ' + mo + ' meses';
      return 'hace ' + Math.floor(mo / 12) + ' años';
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (!Number.isFinite(d.getTime())) return iso;
      return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    function tlBadge(tl) {
      if (!tl) return '<span class="tl tl-gray"><span class="tl-dot"></span>—</span>';
      const cls = 'tl-' + (tl.color || 'gray');
      return `<span class="tl ${cls}" title="${escapeHtml(tl.reason || '')}"><span class="tl-dot"></span>${escapeHtml(tl.reason || '')}</span>`;
    }
    function todayIso() {
      return new Date().toISOString().slice(0, 10);
    }

    // ---------- Toasts ----------
    function ensureToastStack() {
      let s = document.getElementById('toastStack');
      if (!s) {
        s = document.createElement('div');
        s.id = 'toastStack';
        s.className = 'toast-stack';
        document.body.appendChild(s);
      }
      return s;
    }
    function toast(msg, type = '') {
      const s = ensureToastStack();
      const el = document.createElement('div');
      el.className = 'toast' + (type ? ' toast-' + type : '');
      el.textContent = msg;
      s.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 3500);
    }

    // ---------- Modal ----------
    function modal(html) {
      return new Promise((resolve) => {
        const back = document.createElement('div');
        back.className = 'modal-backdrop';
        back.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${html}</div>`;
        document.body.appendChild(back);
        const close = (result) => {
          back.remove();
          resolve(result);
        };
        back.addEventListener('click', (e) => {
          if (e.target === back) close(null);
          if (e.target.matches('[data-modal-action="cancel"]')) close(null);
        });
        // Expose close to the caller so they can finalize on submit
        back._close = close;
        // Focus first input
        setTimeout(() => back.querySelector('input,select,textarea,button')?.focus(), 50);
      });
    }

    // ---------- Routing ----------
    let currentTenantSlug = null;

    const ROUTES = {
      dashboard:    { label: 'Dashboard',     render: renderDashboard },
      tenants:      { label: 'Tenants',       render: renderTenantsList },
      users:        { label: 'Usuarios',      render: () => placeholder('Usuarios', 'Vista global de todas las usuarias (across tenants). Llega luego — entrá por Tenants → click un tenant para ver sus usuarias.') },
      financiero:   { label: 'Financiero',    render: () => placeholder('Financiero', 'Suscripciones, pagos, vencimientos. Stripe + Mercado Pago + transferencia manual. Fase 4–6.') },
      costos:       { label: 'API / Costos',  render: renderCostos },
      logs:         { label: 'Logs',          render: () => placeholder('Logs', 'Eventos del sistema, errores, bug reports de usuarias. Próxima iteración.') },
      config:       { label: 'Configuración', render: () => placeholder('Configuración', 'Precios por tenant, splits, notificaciones, alertas internas.') },
    };

    function route(name, extra) {
      const r = ROUTES[name] || ROUTES.dashboard;
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.route === name);
      });
      crumbEl.innerHTML = `<strong>${r.label}</strong>`;
      contentEl.innerHTML = '';
      r.render(contentEl, extra);
    }

    document.addEventListener('click', (e) => {
      const ni = e.target.closest('.nav-item');
      if (ni && ni.dataset.route) {
        currentTenantSlug = null;
        route(ni.dataset.route);
      }
    });

    // ---------- Views: placeholder ----------
    function placeholder(title, body) {
      contentEl.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">${escapeHtml(title)}</h1>
            <p class="page-sub">Sección en construcción.</p>
          </div>
        </div>
        <div class="placeholder">
          <strong>Próximamente</strong>
          ${escapeHtml(body)}
        </div>
      `;
    }

    // ---------- Views: DASHBOARD ----------
    async function renderDashboard() {
      contentEl.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Bienvenido${session?.displayName ? ', ' + escapeHtml(session.displayName) : ''}</h1>
            <p class="page-sub">Resumen general del ecosistema CoachAI.</p>
          </div>
        </div>
        <div id="dashGrid" class="cards-grid"></div>
        <div id="dashTl" class="cards-grid"></div>
      `;

      const grid = document.getElementById('dashGrid');
      const tl   = document.getElementById('dashTl');

      // Skeleton
      grid.innerHTML = `
        ${statCardSkeleton('Tenants activos')}
        ${statCardSkeleton('Usuarias totales')}
        ${statCardSkeleton('Activas (7d)')}
        ${statCardSkeleton('Bugs reportados')}
        ${statCardSkeleton('Costos del mes (USD)')}
      `;

      const { ok, data } = await api('/api/tower/dashboard');
      if (!ok || !data?.ok) {
        grid.innerHTML = `<div class="stat-card"><div class="stat-label">Error</div><div class="stat-sub">${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div></div>`;
        return;
      }
      const s = data.stats;

      grid.innerHTML = `
        ${statCard('Tenants activos', fmtInt(s.tenants.active), `${fmtInt(s.tenants.total)} totales`)}
        ${statCard('Usuarias totales', fmtInt(s.users.total), `${fmtInt(s.users.active_7d)} activas en 7d`)}
        ${statCard('Activas (7d)', fmtInt(s.users.active_7d), `${pct(s.users.active_7d, s.users.total)} del total`)}
        ${statCard('Bugs reportados', fmtInt(s.bugs.total), `${fmtInt(s.bugs.last_30d)} en últimos 30d`)}
        ${statCard('Costos del mes (USD)', fmtUsd(s.costs.this_month_usd), 'Manuales — ver sección Costos')}
      `;

      const b = s.traffic_light;
      tl.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Distribución de tenants</div>
          <div style="display:flex; gap:14px; align-items:center; margin-top:4px;">
            <span class="tl tl-green"><span class="tl-dot"></span>${fmtInt(b.green)}</span>
            <span class="tl tl-yellow"><span class="tl-dot"></span>${fmtInt(b.yellow)}</span>
            <span class="tl tl-red"><span class="tl-dot"></span>${fmtInt(b.red)}</span>
            <span class="tl tl-gray"><span class="tl-dot"></span>${fmtInt(b.gray)}</span>
          </div>
          <div class="stat-sub">Verde · Amarillo · Rojo · Gris</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Versión Tower</div>
          <div class="stat-value mono" style="font-size:16px;">v0.2.0</div>
          <div class="stat-sub">Fase 2 — Datos reales</div>
        </div>
      `;
    }

    function pct(n, total) {
      if (!total) return '—';
      return Math.round((n / total) * 100) + '%';
    }
    function statCard(label, value, sub) {
      return `<div class="stat-card">
        <div class="stat-label">${escapeHtml(label)}</div>
        <div class="stat-value">${value}</div>
        <div class="stat-sub">${escapeHtml(sub || '')}</div>
      </div>`;
    }
    function statCardSkeleton(label) {
      return `<div class="stat-card">
        <div class="stat-label">${escapeHtml(label)}</div>
        <div class="stat-value"><span class="spinner"></span></div>
        <div class="stat-sub">cargando…</div>
      </div>`;
    }

    // ---------- Views: TENANTS ----------
    async function renderTenantsList(el) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Tenants</h1>
            <p class="page-sub">Todas las cuentas de CoachAI. Click en una fila para ver sus usuarias.</p>
          </div>
        </div>
        <div id="tenantsTable" class="table-wrap"><div class="placeholder"><span class="spinner"></span> &nbsp; Cargando tenants…</div></div>
      `;
      const wrap = document.getElementById('tenantsTable');
      const { ok, data } = await api('/api/tower/tenants');
      if (!ok || !data?.ok) {
        wrap.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      const rows = data.tenants;
      if (!rows.length) {
        wrap.innerHTML = `<div class="placeholder">Sin tenants registrados.</div>`;
        return;
      }
      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Estado</th>
            <th>Tenant</th>
            <th>Tipo</th>
            <th>Dominio</th>
            <th class="cell-right">Usuarias</th>
            <th>Última actividad</th>
          </tr></thead>
          <tbody>
            ${rows.map(t => `
              <tr class="clickable" data-slug="${escapeHtml(t.slug)}">
                <td>${tlBadge(t.traffic_light)}</td>
                <td>
                  <div style="display:flex; align-items:center; gap:10px;">
                    ${t.brand?.accent ? `<span class="swatch" style="width:18px;height:18px;border-radius:4px;background:${escapeHtml(t.brand.accent)};border:1px solid var(--border);display:inline-block;"></span>` : ''}
                    <div>
                      <div style="font-weight:500;">${escapeHtml(t.name)}</div>
                      <div class="cell-mono cell-dim" style="font-size:11px;">${escapeHtml(t.slug)}</div>
                    </div>
                  </div>
                </td>
                <td>
                  ${t.is_cofounder ? '<span class="badge badge-accent">co-founder</span>' : ''}
                  ${t.is_whitelabel ? '<span class="badge">whitelabel</span>' : '<span class="badge">default</span>'}
                </td>
                <td class="cell-mono">${t.domain ? escapeHtml(t.domain) : '<span class="cell-dim">—</span>'}</td>
                <td class="cell-right cell-mono">
                  ${fmtInt(t.users.total)}${t.users.capacity ? ' / ' + fmtInt(t.users.capacity) : ' / ∞'}
                  <div class="cell-dim" style="font-size:11px;">${fmtInt(t.users.active_7d)} activas 7d</div>
                </td>
                <td class="cell-dim">${fmtRelative(t.last_activity)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      wrap.querySelectorAll('tr.clickable').forEach(tr => {
        tr.addEventListener('click', () => openTenantDrill(tr.dataset.slug));
      });
    }

    async function openTenantDrill(slug) {
      currentTenantSlug = slug;
      crumbEl.innerHTML = `<a href="#" id="crumbBack">Tenants</a> · <strong>${escapeHtml(slug)}</strong>`;
      document.getElementById('crumbBack')?.addEventListener('click', (e) => {
        e.preventDefault();
        currentTenantSlug = null;
        route('tenants');
      });
      contentEl.innerHTML = `<div class="placeholder"><span class="spinner"></span> &nbsp; Cargando ${escapeHtml(slug)}…</div>`;

      const { ok, data } = await api(`/api/tower/users?tenant=${encodeURIComponent(slug)}`);
      if (!ok || !data?.ok) {
        contentEl.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      const tenant = data.tenant;
      const users = data.users;

      contentEl.innerHTML = `
        <button class="btn-back" id="backBtn">← Volver a Tenants</button>
        <div class="drill-header">
          <div>
            <div class="drill-title">
              <h1 class="page-title">${escapeHtml(tenant.name)}</h1>
            </div>
            <div class="meta-row">
              <span><strong>${escapeHtml(tenant.slug)}</strong></span>
              <span>${fmtInt(users.length)} usuarias</span>
            </div>
          </div>
        </div>
        <div class="table-wrap">
          ${users.length === 0 ? '<div class="placeholder">Sin usuarias todavía.</div>' : `
          <table class="data-table">
            <thead><tr>
              <th>Estado</th>
              <th>Usuaria</th>
              <th>Última actividad</th>
              <th class="cell-right">Adherencia</th>
              <th class="cell-right">Entrenó (30d)</th>
              <th class="cell-right">Sesiones</th>
              <th class="cell-right">Bugs</th>
            </tr></thead>
            <tbody>
              ${users.map(u => `
                <tr class="clickable" data-uid="${escapeHtml(u.id)}">
                  <td>${tlBadge(u.traffic_light)}</td>
                  <td>
                    <div style="font-weight:500;">${escapeHtml(u.nombre || u.email)}</div>
                    <div class="cell-mono cell-dim" style="font-size:11px;">${escapeHtml(u.email)}</div>
                  </td>
                  <td class="cell-dim">${fmtRelative(u.last_active)}</td>
                  <td class="cell-right cell-mono">${u.stats.adherence != null ? Math.round(u.stats.adherence * 100) + '%' : '—'}</td>
                  <td class="cell-right cell-mono">${fmtInt(u.stats.daysTrained30d)}${u.stats.weeklyTarget ? ' <span class="cell-dim">/ ' + (u.stats.weeklyTarget * 4) + '</span>' : ''}</td>
                  <td class="cell-right cell-mono">${fmtInt(u.session_count)}</td>
                  <td class="cell-right">
                    ${u.stats.openBugs > 0 ? `<span class="badge badge-danger">${u.stats.openBugs}</span>` : '<span class="cell-dim">0</span>'}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
        </div>
        ${renderBugsBlock(users)}
      `;
      document.getElementById('backBtn').addEventListener('click', () => { currentTenantSlug = null; route('tenants'); });
    }

    function renderBugsBlock(users) {
      const allBugs = [];
      users.forEach(u => {
        (u.bugs || []).forEach(b => allBugs.push({ ...b, usuario: u.nombre || u.email }));
      });
      if (!allBugs.length) return '';
      return `
        <div style="margin-top:32px;">
          <h2 style="font-size:14px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin:0 0 12px;">
            Bugs reportados
          </h2>
          ${allBugs.map(b => `
            <div class="bug-item">
              <div>${escapeHtml(b.mensaje)}</div>
              <div class="bug-meta">${escapeHtml(b.usuario)} · ${fmtRelative(b.created_at)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ---------- Views: COSTOS ----------
    let _tenantsCache = null;
    async function loadTenantsForSelect() {
      if (_tenantsCache) return _tenantsCache;
      const { data } = await api('/api/tower/tenants');
      _tenantsCache = (data?.tenants || []).map(t => ({ id: t.id, slug: t.slug, name: t.name }));
      return _tenantsCache;
    }

    async function renderCostos(el) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Costos</h1>
            <p class="page-sub">Registro manual de gastos. Infraestructura compartida y costos atribuidos a un tenant.</p>
          </div>
          <button class="btn btn-primary-sm" id="addCostBtn">+ Nuevo costo</button>
        </div>
        <div id="costsTotals" class="cards-grid"></div>
        <div id="costsTable" class="table-wrap" style="margin-top:8px;"><div class="placeholder"><span class="spinner"></span> &nbsp; Cargando…</div></div>
      `;
      document.getElementById('addCostBtn').addEventListener('click', openAddCostModal);
      await loadCostsTable();
    }

    async function loadCostsTable() {
      const wrap = document.getElementById('costsTable');
      const totalsEl = document.getElementById('costsTotals');
      const { ok, data } = await api('/api/tower/costs');
      if (!ok || !data?.ok) {
        wrap.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      const rows = data.costs;
      const t = data.totals;
      totalsEl.innerHTML = `
        ${statCard('Total acumulado', fmtUsd(t.usd), `${fmtInt(t.count)} registros`)}
        ${statCard('Compartido (infra)', fmtUsd(t.shared_usd), 'No atribuido a un tenant')}
        ${statCard('Atribuido a tenants', fmtUsd(t.attributed_usd), 'Costo directo a un tenant')}
      `;
      if (!rows.length) {
        wrap.innerHTML = `<div class="placeholder"><strong>Sin costos registrados</strong>Cargá el primero con el botón "+ Nuevo costo".</div>`;
        return;
      }
      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Período</th>
            <th>Concepto</th>
            <th>Proveedor</th>
            <th>Tenant</th>
            <th>Frecuencia</th>
            <th class="cell-right">Monto (USD)</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr data-id="${escapeHtml(r.id)}">
                <td class="cell-mono">${fmtDate(r.period_start)}${r.period_end ? '<div class="cell-dim" style="font-size:11px;">→ ' + fmtDate(r.period_end) + '</div>' : ''}</td>
                <td>
                  <div style="font-weight:500;">${escapeHtml(r.label)}</div>
                  ${r.notes ? `<div class="cell-dim" style="font-size:11px;">${escapeHtml(r.notes)}</div>` : ''}
                </td>
                <td><span class="badge">${escapeHtml(r.provider)}</span></td>
                <td>${r.tenants ? `<span class="badge badge-accent">${escapeHtml(r.tenants.slug)}</span>` : '<span class="cell-dim">— compartido</span>'}</td>
                <td class="cell-dim">${escapeHtml(r.billing_period)}</td>
                <td class="cell-right cell-mono">${fmtUsd(r.amount_usd)}</td>
                <td class="cell-right">
                  <button class="btn btn-danger-ghost" data-delete="${escapeHtml(r.id)}" title="Eliminar">×</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      wrap.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('¿Eliminar este registro de costo?')) return;
          const id = btn.dataset.delete;
          const { ok } = await api(`/api/tower/costs?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
          if (ok) { toast('Costo eliminado', 'success'); loadCostsTable(); }
          else { toast('No se pudo eliminar', 'error'); }
        });
      });
    }

    async function openAddCostModal() {
      const tenants = await loadTenantsForSelect();
      const today = todayIso();
      const providers = ['vercel','supabase','resend','anthropic','godaddy','stripe','mercadopago','otro'];

      const html = `
        <h2>Nuevo costo</h2>
        <div class="field">
          <label>Concepto</label>
          <input id="m_label" type="text" placeholder="Ej: Vercel Pro · mayo" autocomplete="off" required>
        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Proveedor</label>
            <select id="m_provider">
              ${providers.map(p => `<option value="${p}">${p}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Monto (USD)</label>
            <input id="m_amount" type="number" step="0.01" min="0" placeholder="0.00" required>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Inicio de período</label>
            <input id="m_start" type="date" value="${today}" required>
          </div>
          <div class="field">
            <label>Fin de período (opcional)</label>
            <input id="m_end" type="date">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Frecuencia</label>
            <select id="m_period">
              <option value="monthly">Mensual</option>
              <option value="yearly">Anual</option>
              <option value="one-time">Único</option>
            </select>
          </div>
          <div class="field">
            <label>Tenant (opcional)</label>
            <select id="m_tenant">
              <option value="">— Compartido (infra)</option>
              ${tenants.map(t => `<option value="${escapeHtml(t.id)}">${escapeHtml(t.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field">
          <label>Notas (opcional)</label>
          <textarea id="m_notes" placeholder="Detalle, factura, etc."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn" data-modal-action="cancel">Cancelar</button>
          <button class="btn btn-primary-sm" id="m_save">Guardar</button>
        </div>
      `;

      const back = document.createElement('div');
      back.className = 'modal-backdrop';
      back.innerHTML = `<div class="modal">${html}</div>`;
      document.body.appendChild(back);
      const close = () => back.remove();
      back.addEventListener('click', (e) => {
        if (e.target === back) close();
        if (e.target.matches('[data-modal-action="cancel"]')) close();
      });
      setTimeout(() => back.querySelector('#m_label')?.focus(), 50);

      back.querySelector('#m_save').addEventListener('click', async () => {
        const payload = {
          label: back.querySelector('#m_label').value.trim(),
          provider: back.querySelector('#m_provider').value,
          amount_usd: parseFloat(back.querySelector('#m_amount').value),
          billing_period: back.querySelector('#m_period').value,
          period_start: back.querySelector('#m_start').value,
          period_end: back.querySelector('#m_end').value || null,
          tenant_id: back.querySelector('#m_tenant').value || null,
          notes: back.querySelector('#m_notes').value.trim() || null,
        };
        if (!payload.label) return toast('Falta el concepto', 'error');
        if (!(payload.amount_usd >= 0)) return toast('Monto inválido', 'error');
        if (!payload.period_start) return toast('Falta el inicio de período', 'error');

        const btn = back.querySelector('#m_save');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        const { ok, data } = await api('/api/tower/costs', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        btn.disabled = false;
        btn.textContent = 'Guardar';
        if (!ok || !data?.ok) {
          toast(data?.error || 'No se pudo guardar', 'error');
          return;
        }
        toast('Costo agregado', 'success');
        close();
        loadCostsTable();
      });
    }

    // ---------- Boot ----------
    checkSession();
  })();
  </script>
</body>
</html>
