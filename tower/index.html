<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#0B0F17" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F6F8FB" media="(prefers-color-scheme: light)">
  <title>TOWER — CoachAI</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/tower/icon-favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/tower/icon-192.png">

  <!-- PWA -->
  <link rel="manifest" href="/tower/manifest.json">
  <link rel="apple-touch-icon" href="/tower/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- "default" tells iOS NOT to overlay the status bar; iOS draws a normal
       status bar tinted by our theme-color, and our content starts below it.
       Avoids the entire "content under the status bar" problem. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TOWER">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Service worker lifecycle. Two responsibilities:
       1) Purge any leaked SW from the main CoachAI app (different scope but
          some browsers leak across hostnames if mistakenly registered).
       2) Register Tower's own SW (network-only — admin data must be fresh,
          we never want to serve stale cached HTML). The SW only enables
          installability + offline fallback, not caching of dynamic data. -->
  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;
      try {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          var hasStranger = false;
          regs.forEach(function(r){
            var scope = (r.scope || '').toLowerCase();
            // Anything not scoped to /tower/ on THIS origin is a stranger.
            if (scope.indexOf('/tower/') === -1) {
              r.unregister();
              hasStranger = true;
            }
          });
          if (hasStranger && window.caches && caches.keys) {
            caches.keys().then(function(keys){
              keys.forEach(function(k){
                if (k.indexOf('tower-') !== 0) caches.delete(k);
              });
              if (!sessionStorage.getItem('tower.swPurged')) {
                sessionStorage.setItem('tower.swPurged', '1');
                location.replace(location.pathname);
                return;
              }
            });
          }
          // Register Tower's SW (network-first, scoped to /tower/)
          window.addEventListener('load', function(){
            navigator.serviceWorker.register('/tower/sw.js', { scope: '/tower/' })
              .catch(function(){ /* non-fatal */ });
          });
        });
      } catch(_){}
    })();
  </script>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

  <style>
    /* ---------- THEME TOKENS ---------- */
    :root[data-theme="dark"] {
      --bg:           #0B0F17;
      --bg-elev:      #141A24;
      --bg-elev-2:    #1C2330;
      --border:       #2A3441;
      --border-soft:  #1F2733;
      --text:         #E8ECF3;
      --text-muted:   #8B95A7;
      --text-dim:     #4A5468;
      --accent:       #5B8DEF;
      --accent-hover: #7AA3F5;
      --accent-soft:  rgba(91, 141, 239, 0.12);
      --danger:       #EF4444;
      --warning:      #F59E0B;
      --success:      #22C55E;
      --neutral:      #6B7280;
      --shadow-card:  none;
      --input-bg:     #0F141D;
    }
    :root[data-theme="light"] {
      --bg:           #F6F8FB;
      --bg-elev:      #FFFFFF;
      --bg-elev-2:    #F0F3F8;
      --border:       #DCE2EA;
      --border-soft:  #E8EDF3;
      --text:         #121821;
      --text-muted:   #5C6877;
      --text-dim:     #9BA6B5;
      --accent:       #2563EB;
      --accent-hover: #1D4ED8;
      --accent-soft:  rgba(37, 99, 235, 0.10);
      --danger:       #DC2626;
      --warning:      #D97706;
      --success:      #16A34A;
      --neutral:      #6B7280;
      --shadow-card:  0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
      --input-bg:     #FFFFFF;
    }

    /* ---------- RESET / BASE ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.45;
    }
    .mono {
      font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    button { font: inherit; cursor: pointer; }

    /* ---------- LOGIN ---------- */
    .login-wrap {
      /* Fixed overlay on top of the app shell. The app stays mounted
         underneath so iOS keeps a stable layout (safe-area-insets are
         computed once and don't reflow on auth state changes). */
      position: fixed;
      inset: 0;
      z-index: 60;
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top, 0px));
      padding-bottom: max(24px, env(safe-area-inset-bottom, 0px));
      padding-left: max(24px, env(safe-area-inset-left, 0px));
      padding-right: max(24px, env(safe-area-inset-right, 0px));
      transition: opacity 0.18s ease, visibility 0.18s;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: var(--shadow-card);
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .login-brand svg { width: 28px; height: 28px; color: var(--accent); }
    .login-brand .wm {
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 15px;
    }
    .login-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 600;
    }
    .login-sub {
      margin: 0 0 24px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      /* 16px is mandatory on mobile: iOS Safari auto-zooms in when focusing
         any <input>/<select>/<textarea> with font-size < 16px AND does NOT
         zoom back out on blur — leaving the viewport stuck at the zoomed
         level and pushing the topbar off-screen post-login. */
      font-size: 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      display: none;
    }
    .login-error.show { display: block; }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .theme-toggle-floating {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-toggle-floating:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-toggle-floating svg { width: 16px; height: 16px; }

    /* ---------- APP SHELL ---------- */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .sidebar {
      background: var(--bg-elev);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      padding-top: max(16px, env(safe-area-inset-top, 0px));
      padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
      padding-left: max(12px, env(safe-area-inset-left, 0px));
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px 20px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 16px;
    }
    .sidebar-brand svg { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; }
    .sidebar-brand .wm {
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 13px;
    }
    .nav-section {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 14px 10px 6px;
    }
    .metrics-subhead {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin: 22px 2px 10px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover {
      background: var(--bg-elev-2);
      color: var(--text);
    }
    .nav-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-foot {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
    }
    .sidebar-foot .name {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      transition: background 0.12s, color 0.12s;
    }
    .icon-btn:hover { background: var(--bg-elev-2); color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      padding-top: env(safe-area-inset-top, 0px);
      padding-right: max(24px, env(safe-area-inset-right, 0px));
      height: calc(48px + env(safe-area-inset-top, 0px));
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .crumb {
      font-size: 13px;
      color: var(--text-muted);
    }
    .crumb strong {
      color: var(--text);
      font-weight: 500;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .content {
      padding: 28px 32px;
      padding-bottom: max(28px, env(safe-area-inset-bottom, 0px));
      padding-right: max(32px, env(safe-area-inset-right, 0px));
      overflow-y: auto;
    }
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .page-sub {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .placeholder {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 60px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      background: var(--bg-elev);
    }
    .placeholder strong {
      display: block;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: var(--shadow-card);
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }
    .stat-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ---------- TRAFFIC LIGHT ---------- */
    .tl {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .tl-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-green  .tl-dot { background: var(--success); box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
    .tl-yellow .tl-dot { background: var(--warning); box-shadow: 0 0 6px rgba(245, 158, 11, 0.5); }
    .tl-red    .tl-dot { background: var(--danger);  box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }
    .tl-gray   .tl-dot { background: var(--neutral); }

    /* ---------- UTILS ---------- */
    .hidden { display: none !important; }
    /* Soft hide: keeps element in the layout (preserves iOS safe-area-inset
       computation) but invisible and non-interactive. Used for login/app
       transitions so we never trigger a display:none → display:block cycle
       that confuses iOS PWA viewport metrics. */
    .faded {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* boot loader — sits above everything until checkSession resolves */
    .boot {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      z-index: 80;
      transition: opacity 0.15s ease, visibility 0.15s;
    }

    /* ---------- TABLES ---------- */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
    }
    .data-table tbody td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr {
      cursor: default;
      transition: background 0.1s;
    }
    .data-table tbody tr.clickable { cursor: pointer; }
    .data-table tbody tr.clickable:hover { background: var(--bg-elev-2); }
    .data-table .cell-mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 12px; }
    .data-table .cell-dim  { color: var(--text-dim); }
    .data-table .cell-right { text-align: right; }
    .table-wrap { overflow-x: auto; }

    /* ---------- BADGES ---------- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--bg-elev-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .badge-accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
    .badge-success { background: rgba(34,197,94,0.12); color: var(--success); border-color: transparent; }
    .badge-warning { background: rgba(245,158,11,0.12); color: var(--warning); border-color: transparent; }
    .badge-danger  { background: rgba(239,68,68,0.12);  color: var(--danger);  border-color: transparent; }

    /* ---------- BUTTONS ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { background: var(--bg-elev-2); border-color: var(--text-muted); }
    .btn-primary-sm {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary-sm:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-danger-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--danger);
      padding: 4px 8px;
    }
    .btn-danger-ghost:hover { background: rgba(239,68,68,0.10); }
    .btn-back {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 4px 0;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }
    .btn-back:hover { color: var(--text); }

    /* ---------- MODAL ---------- */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      display: grid; place-items: center;
      z-index: 100;
      /* Stop iOS rubber-band scrolling from leaking through to the body
         behind the modal (user could pan the dashboard left/right or
         pull-down behind the modal). */
      overscroll-behavior: contain;
      touch-action: none;
    }
    :root[data-theme="light"] .modal-backdrop { background: rgba(15,23,42,0.35); }
    .modal {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      touch-action: pan-y; /* allow vertical scroll INSIDE the modal only */
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    /* When a modal is open we freeze the page underneath so the only thing
       that scrolls is the modal itself. The body lock is set via JS
       (saves scrollY then position:fixed; top:-scrollY) — this CSS hook
       prevents the brief flash before JS runs. */
    body.modal-locked {
      overflow: hidden !important;
      overscroll-behavior: none !important;
    }
    .modal h2 {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 600;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .field select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      /* See note on .field input — 16px to prevent iOS auto-zoom on focus. */
      font-size: 16px;
    }
    .field textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      /* See note on .field input — 16px to prevent iOS auto-zoom on focus. */
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ---------- DRILL HEADER ---------- */
    .drill-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .drill-title { display: flex; align-items: center; gap: 10px; }
    .drill-title .swatch {
      width: 28px; height: 28px; border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-row strong { color: var(--text); font-weight: 500; }

    /* ---------- BUGS DETAIL ---------- */
    .bug-item {
      padding: 10px 12px;
      background: rgba(239,68,68,0.05);
      border-left: 2px solid var(--danger);
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .bug-item .bug-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ---------- EMPTY STATE ---------- */
    .empty-row {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ---------- TOAST ---------- */
    .toast-stack {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom, 0px));
      right: max(24px, env(safe-area-inset-right, 0px));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }
    .toast {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      animation: slideIn 0.2s ease-out;
    }
    .toast-error { border-color: var(--danger); color: var(--danger); }
    .toast-success { border-color: var(--success); color: var(--success); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ---------- HAMBURGER (mobile) ---------- */
    .hamburger {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .hamburger svg { width: 16px; height: 16px; }
    .hamburger:active { background: var(--bg-elev-2); }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 49;
    }
    :root[data-theme="light"] .sidebar-overlay { background: rgba(15,23,42,0.35); }

    /* Topbar mobile branding (hidden on desktop, replaces sidebar logo on mobile) */
    .topbar-brand {
      display: none;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 13px;
    }
    .topbar-brand svg { width: 18px; height: 18px; color: var(--accent); }

    /* ---------- RESPONSIVE BREAKPOINTS ---------- */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 260px;
        max-width: 80vw;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.2s ease-out;
        box-shadow: 4px 0 24px rgba(0,0,0,0.3);
      }
      .app.menu-open .sidebar {
        transform: translateX(0);
      }
      .app.menu-open .sidebar-overlay {
        display: block;
      }
      .hamburger { display: inline-flex; }
      .topbar-brand { display: inline-flex; }
      .topbar {
        padding-left: 12px;
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }
      .crumb { display: none; }
      .content {
        padding: 16px 12px;
        padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }
      .page-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        margin-bottom: 16px;
      }
      .page-title { font-size: 18px; }
      .page-sub { font-size: 12px; }

      .cards-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .stat-card { padding: 14px; }
      .stat-value { font-size: 20px; }

      .data-table thead th { padding: 8px 10px; font-size: 9px; }
      .data-table tbody td { padding: 10px 10px; font-size: 12px; }

      .modal {
        max-height: 96vh;
        margin: 8px;
        padding: 14px 16px;
      }
      .modal h2 { margin-bottom: 10px; font-size: 15px; }
      /* Tighter form on mobile so the cost modal fits in one viewport,
         no scroll needed — every saved millisecond of cognitive load
         counts when logging quick expenses. */
      .modal .field { margin-bottom: 8px; }
      .modal .field label { margin-bottom: 3px; font-size: 10px; }
      .modal .field input,
      .modal .field select,
      .modal .field textarea {
        padding: 8px 10px;
      }
      .modal .field textarea { min-height: 40px; }
      .modal .form-grid-2 { gap: 8px; }
      .modal .modal-actions { margin-top: 12px; }
      /* Keep 2-col grids on mobile (don't force them to stack) — they
         fit comfortably and shave 4 vertical slots from the cost form. */
      .modal .form-grid-2 { grid-template-columns: 1fr 1fr; }

      .drill-header {
        flex-direction: column;
        gap: 8px;
      }

      .toast-stack {
        bottom: 12px;
        right: 12px;
        left: 12px;
      }
      .toast { font-size: 12px; }

      /* Login on mobile: full bleed, smaller paddings */
      .login-card {
        padding: 28px 20px;
        border-radius: 14px;
      }

    }

    @media (max-width: 420px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }

    /* PWA standalone tweaks (avoid iOS bouncing white area) */
    @media (display-mode: standalone) {
      html, body { background: var(--bg); overscroll-behavior-y: none; }
    }
  </style>
</head>

  <script>
  (() => {
    // ---------- Theme ----------
    const THEME_KEY = 'tower.theme';
    const root = document.documentElement;
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      try { localStorage.setItem(THEME_KEY, t); } catch {}
      updateThemeIcons(t);
    }
    function updateThemeIcons(t) {
      const moon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
      const sun  = `<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>`;
      const svg = t === 'dark' ? sun : moon;
      const a = document.getElementById('themeIcon');
      const b = document.getElementById('loginThemeIcon');
      if (a) a.innerHTML = svg;
      if (b) b.innerHTML = svg;
    }
    function toggleTheme() {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    }
    function initTheme() {
      let t = null;
      try { t = localStorage.getItem(THEME_KEY); } catch {}
      if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      applyTheme(t);
    }
    initTheme();

    document.addEventListener('click', (e) => {
      const tt = e.target.closest('#themeToggle, #loginThemeToggle');
      if (tt) { e.preventDefault(); toggleTheme(); }
    });

    // ---------- DOM refs ----------
    const $ = (sel) => document.querySelector(sel);
    const boot = $('#boot');
    const loginEl = $('#login');
    const appEl = $('#app');
    const loginForm = $('#loginForm');
    const loginError = $('#loginError');
    const loginSubmit = $('#loginSubmit');
    const userAvatar = $('#userAvatar');
    const userName = $('#userName');
    const contentEl = $('#content');
    const crumbEl = $('#crumb');
    const logoutBtn = $('#logoutBtn');

    // ---------- Auth flow ----------
    let session = null;

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        ...opts,
      });
      let data = null;
      try { data = await res.json(); } catch {}
      return { ok: res.ok, status: res.status, data };
    }

    function showError(msg) {
      loginError.textContent = msg;
      loginError.classList.add('show');
    }
    function clearError() {
      loginError.textContent = '';
      loginError.classList.remove('show');
    }

    async function checkSession() {
      const { ok, data } = await api('/api/tower/me');
      if (ok && data && data.ok) {
        session = data.user;
        enterApp();
      } else {
        showLogin();
      }
    }

    // Safety-net nudge: forces a synthetic layout pass. With the new
    // overlay architecture (app always mounted, login fades over it) this
    // rarely matters, but it's cheap and helps on edge cases (rotating
    // the device, returning from background, etc).
    function nudgeViewport() {
      requestAnimationFrame(() => {
        window.dispatchEvent(new Event('resize'));
        requestAnimationFrame(() => { void document.body.offsetHeight; });
      });
    }

    function showLogin() {
      boot.classList.add('faded');
      appEl.classList.add('faded');
      loginEl.classList.remove('faded');
      setTimeout(() => $('#loginUser')?.focus(), 50);
    }

    function enterApp() {
      boot.classList.add('faded');
      loginEl.classList.add('faded');
      appEl.classList.remove('faded');
      userName.textContent = session.displayName || session.username;
      userAvatar.textContent = (session.displayName || session.username || '?').charAt(0).toUpperCase();
      route('dashboard');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const username = $('#loginUser').value.trim();
      const password = $('#loginPass').value;
      if (!username || !password) { showError('Completá usuario y contraseña.'); return; }
      loginSubmit.disabled = true;
      loginSubmit.innerHTML = '<span class="spinner"></span> Verificando...';
      const { ok, status, data } = await api('/api/tower/login', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });
      loginSubmit.disabled = false;
      loginSubmit.textContent = 'Ingresar';
      if (ok && data && data.ok) {
        session = data.user;
        $('#loginPass').value = '';
        enterApp();
      } else if (status === 401) {
        showError('Usuario o contraseña incorrectos.');
      } else {
        showError('No se pudo iniciar sesión. Probá de nuevo.');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await api('/api/tower/login', { method: 'DELETE' });
      session = null;
      showLogin();
    });

    // ---------- Utilities ----------
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function fmtUsd(n) {
      const v = Number(n || 0);
      return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function fmtInt(n) {
      return Number(n || 0).toLocaleString('en-US');
    }
    function fmtRelative(iso) {
      if (!iso) return '—';
      const t = new Date(iso).getTime();
      if (!Number.isFinite(t)) return '—';
      const diff = Date.now() - t;
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return 'hace ' + sec + 's';
      const min = Math.floor(sec / 60);
      if (min < 60) return 'hace ' + min + ' min';
      const hr = Math.floor(min / 60);
      if (hr < 24) return 'hace ' + hr + ' h';
      const d = Math.floor(hr / 24);
      if (d < 30) return 'hace ' + d + ' d';
      const mo = Math.floor(d / 30);
      if (mo < 12) return 'hace ' + mo + ' meses';
      return 'hace ' + Math.floor(mo / 12) + ' años';
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (!Number.isFinite(d.getTime())) return iso;
      return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    function tlBadge(tl) {

    // ---------- Modal ----------
    // Body scroll lock — prevents iOS rubber-band scrolling on the page
    // underneath when a modal is open. Uses position:fixed to freeze the
    // viewport at the current scroll position (other techniques like just
    // overflow:hidden don't hold iOS in PWA mode). Restores scroll on unlock.
    let _modalLockCount = 0;
    let _modalLockedScrollY = 0;
    function lockBodyScroll() {
      _modalLockCount++;
      if (_modalLockCount > 1) return; // already locked
      _modalLockedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
      document.body.classList.add('modal-locked');
      document.body.style.position = 'fixed';
      document.body.style.top = `-${_modalLockedScrollY}px`;
      document.body.style.left = '0';
      document.body.style.right = '0';
      document.body.style.width = '100%';
    }
    function unlockBodyScroll() {
      _modalLockCount = Math.max(0, _modalLockCount - 1);
      if (_modalLockCount > 0) return; // another modal still open
      document.body.classList.remove('modal-locked');
      document.body.style.position = '';
      document.body.style.top = '';
      document.body.style.left = '';
      document.body.style.right = '';
      document.body.style.width = '';
      window.scrollTo(0, _modalLockedScrollY);
    }

    function modal(html) {
      return new Promise((resolve) => {
        const back = document.createElement('div');
        back.className = 'modal-backdrop';
        back.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${html}</div>`;
        document.body.appendChild(back);
        lockBodyScroll();
        const close = (result) => {
          back.remove();
          unlockBodyScroll();
          resolve(result);
        };
        back.addEventListener('click', (e) => {
          if (e.target === back) close(null);
          if (e.target.matches('[data-modal-action="cancel"]')) close(null);
        });
        // Expose close to the caller so they can finalize on submit
        back._close = close;
        // Focus first input
        setTimeout(() => back.querySelector('input,select,textarea,button')?.focus(), 50);
      });
    }

    // POST /api/tower/resolve_bug to mark a feedback row as fixed. After
    // success, refresh the current view so the bug moves to the "Resueltos"
    // accordion and the count chip updates.
    async function resolveBugFromTower(btn) {
      const id = btn.dataset.bugResolve;
      if (!id) return;
      const note = prompt('Nota de resolución (opcional — ej: "fixed in 7f10598, iOS zoom on inputs"):', '');
      if (note === null) return; // user hit Cancel
      btn.disabled = true;
      btn.textContent = '⏳ Resolviendo…';
      try {
        const r = await fetch('/api/tower/resolve_bug', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, note: (note || '').trim() }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok || !data?.ok) {
          throw new Error(data?.error || data?.detail || `HTTP ${r.status}`);
        }
        // Refresh: re-trigger the currently active sidebar route so the
        // bugs block re-renders with the new state. Falls back to a hard
        // reload if for some reason the active nav can't be found.
        const activeNav = document.querySelector('.nav-item.active');
        const activeRoute = activeNav?.dataset.route;
        if (activeRoute && typeof route === 'function') route(activeRoute);
        else window.location.reload();
      } catch (err) {
        console.error('[tower] resolve bug failed:', err);
        alert('No se pudo marcar como resuelto: ' + (err.message || 'reintentá'));
        btn.disabled = false;
        btn.textContent = '✓ Resolver';
      }
    }

    // ---------- Views: MÉTRICAS ----------
    const CHART_COLOR = '#7c5cff';
    function fmtMoney(n) {
      const v = Math.round((Number(n) || 0) * 100) / 100;
      return v.toLocaleString('es-AR', { maximumFractionDigits: 2 });
    }
    function emptyChart(msg) {
      return `<div class="stat-sub" style="padding:18px 4px; opacity:.65;">${escapeHtml(msg)}</div>`;
    }
    // Gráfico de barras simple en SVG. items: [{label, value}]
    function barChart(items) {
      if (!items || !items.length) return emptyChart('Sin datos');
      const max = Math.max(1, ...items.map(i => Number(i.value) || 0));
      const n = items.length;
      const W = Math.max(n * 42, 220), H = 130, pad = 16;
      const slot = (W - pad * 2) / n;
      const bw = Math.max(8, slot - 8);
      let svg = '';
      items.forEach((it, idx) => {
        const v = Number(it.value) || 0;
        const x = pad + idx * slot + (slot - bw) / 2;
        const h = (v / max) * (H - 40);
        const y = H - 22 - h;
        svg += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, h).toFixed(1)}" rx="3" fill="${CHART_COLOR}"></rect>`;
        svg += `<text x="${(x + bw / 2).toFixed(1)}" y="${(y - 4).toFixed(1)}" font-size="9" text-anchor="middle" fill="currentColor" opacity="0.85">${escapeHtml(String(v))}</text>`;
        svg += `<text x="${(x + bw / 2).toFixed(1)}" y="${H - 6}" font-size="8" text-anchor="middle" fill="currentColor" opacity="0.55">${escapeHtml(String(it.label))}</text>`;
      });
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; margin-top:10px;">${svg}</svg>`;
    }
    // Gráfico de línea simple en SVG. items: [{label, value}]
    function lineChart(items) {
      if (!items || !items.length) return emptyChart('Sin datos');
      const max = Math.max(1, ...items.map(i => Number(i.value) || 0));
      const n = items.length;
      const W = 640, H = 140, pad = 24;
      const xstep = (W - pad * 2) / Math.max(1, n - 1);
      const pts = items.map((it, i) => [pad + i * xstep, H - 24 - ((Number(it.value) || 0) / max) * (H - 44)]);
      const path = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      const area = `M${pts[0][0].toFixed(1)},${(H - 24).toFixed(1)} ` + pts.map(p => `L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ') + ` L${pts[n - 1][0].toFixed(1)},${(H - 24).toFixed(1)} Z`;
      const lbl = (i) => items[i] ? `<text x="${pts[i][0].toFixed(1)}" y="${H - 6}" font-size="8" text-anchor="middle" fill="currentColor" opacity="0.55">${escapeHtml(String(items[i].label))}</text>` : '';
      const peak = Math.max(...items.map(i => Number(i.value) || 0));
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; margin-top:10px;">
        <path d="${area}" fill="${CHART_COLOR}" opacity="0.12"></path>
        <path d="${path}" fill="none" stroke="${CHART_COLOR}" stroke-width="2" stroke-linejoin="round"></path>
        <text x="${pad}" y="12" font-size="9" fill="currentColor" opacity="0.6">pico: ${peak}</text>
        ${lbl(0)}${lbl(Math.floor(n / 2))}${lbl(n - 1)}
      </svg>`;
    }
    function inactiveTable(users) {
      if (!users || !users.length) {
        return `<div class="stat-sub" style="padding:14px 4px; opacity:.75;">Ningún usuario inactivo — todos entraron en la última semana.</div>`;

    function teamB64ToUint8(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64); const arr = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return arr;
    }

    // --- Push del Team: activar notificaciones desde Tower (1 toque por dispositivo) ---
    function teamUpdateNotifBtn(active) {
      const btn = document.getElementById('teamNotifBtn'); if (!btn) return;
      // Ya activadas → el botón se esconde (no ocupa espacio residual). En otro
      // dispositivo sin activar, vuelve a aparecer (el estado es por-dispositivo).
      if (active) { btn.style.display = 'none'; }
      else { btn.style.display = ''; btn.textContent = '🔔 Activar notificaciones'; btn.disabled = false; btn.style.opacity = ''; }
    }
    async function teamRefreshNotifState() {
      const btn = document.getElementById('teamNotifBtn'); if (!btn) return;
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) { btn.style.display = 'none'; return; }
        if (Notification.permission === 'granted') {
          const reg = await navigator.serviceWorker.ready;
          const sub = await reg.pushManager.getSubscription();
          if (sub) {
            // Re-sincroniza con el server (idempotente, SIN push de confirmación):
            // cubre el caso de un sub que quedó en el browser pero no se guardó en el
            // server (p.ej. un intento previo con "sesión sin member"). Solo marca
            // "activado" si el server confirma que lo tiene.
            const { ok, data } = await api('/api/tower/team?push=sub', { method: 'POST', body: JSON.stringify({ subscription: sub.toJSON ? sub.toJSON() : sub, silent: true }) });
            if (ok && data?.ok) { teamUpdateNotifBtn(true); return; }
          }
        }
        teamUpdateNotifBtn(false);
      } catch (_) { teamUpdateNotifBtn(false); }
    }
    async function teamSubscribePush() {
      const btn = document.getElementById('teamNotifBtn');
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) { toast('Tu navegador no soporta notificaciones', 'error'); return; }
        if (btn) { btn.disabled = true; btn.textContent = 'Activando…'; }
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { toast('No diste el permiso de notificaciones', 'error'); teamUpdateNotifBtn(false); return; }
        const reg = await navigator.serviceWorker.ready;
        let sub = await reg.pushManager.getSubscription();
        if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: teamB64ToUint8(TEAM_VAPID_PUBLIC) });
        const { ok, data } = await api('/api/tower/team?push=sub', { method: 'POST', body: JSON.stringify({ subscription: sub.toJSON ? sub.toJSON() : sub }) });
        if (ok && data?.ok) { toast('¡Listo! Notificaciones activadas ✅', 'success'); teamUpdateNotifBtn(true); }
        else { toast('No se pudo activar: ' + (data?.error || 'reintentá'), 'error'); teamUpdateNotifBtn(false); }
      } catch (e) { console.error('[team] push subscribe', e); toast('No se pudo activar (en iPhone, instalá Tower primero)', 'error'); teamUpdateNotifBtn(false); }
    }

    function isoLocal(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    // Semana Lunes→Domingo, desplazada `offset` semanas. Mediodía local evita líos de DST.
    function teamWeekDates(offset) {
      const now = new Date(); now.setHours(12, 0, 0, 0);
      const backToMon = (now.getDay() + 6) % 7;               // 0=dom..6=sab → lunes
      const mon = new Date(now); mon.setDate(now.getDate() - backToMon + offset * 7);
      const names = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
      const today = isoLocal(new Date());
      const out = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(mon); d.setDate(mon.getDate() + i);
        const iso = isoLocal(d);
        out.push({ iso, name: names[i], dd: String(d.getDate()).padStart(2, '0'), mm: String(d.getMonth() + 1).padStart(2, '0'), isToday: iso === today });
      }
      return out;
    }

      const from = teamDates[0].iso, to = teamDates[6].iso;
      const lbl = document.getElementById('teamWeekLabel');
      if (lbl) lbl.textContent = `${teamDates[0].dd}/${teamDates[0].mm} – ${teamDates[6].dd}/${teamDates[6].mm}`;
      const board = document.getElementById('teamBoard');
      board.innerHTML = '<div class="placeholder"><span class="spinner"></span> &nbsp; Cargando…</div>';
      const { ok, data } = await api(`/api/tower/team?from=${from}&to=${to}`);
      if (!ok || !data?.ok) {
        board.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      teamTasks = data.tasks || [];
      teamMe = data.me || (session && session.member) || null;
      teamRenderBoard(teamDates);
    }

    function teamRenderBoard(dates) {
      const today = isoLocal(new Date());
      let tasks = teamTasks.slice();
      if (teamMyOnly && teamMe) tasks = tasks.filter(t => (t.asignados || []).includes(teamMe));
      // Fecha de visualización: una activa vieja se arrastra a "hoy".
      tasks.forEach(t => {
        const active = TEAM_ACTIVE.includes(t.estado);
        t._display = (active && t.fecha < today) ? today : t.fecha;
      });
      const byDay = {};
      tasks.forEach(t => { (byDay[t._display] = byDay[t._display] || []).push(t); });
      const sortFn = (a, b) => (a.hora || '99:99').localeCompare(b.hora || '99:99') || (a.created_at || '').localeCompare(b.created_at || '');
      const html = dates.map(d => {
        const list = (byDay[d.iso] || []).sort(sortFn);
        return `<div class="tday${d.isToday ? ' tday-today' : ''}">
          <div class="tday-head">
            <span class="tday-name">${d.name}</span>
            <span class="tday-date">${d.dd}/${d.mm}</span>
            ${d.isToday ? '<span class="tday-hoy">hoy</span>' : ''}
            <span class="tday-add" data-add="${d.iso}" title="Agregar tarea en este día">+</span>
          </div>
          <div class="tday-list">${list.length ? list.map(teamTaskCard).join('') : '<div class="tday-empty">—</div>'}</div>
        </div>`;
      }).join('');
      const board = document.getElementById('teamBoard');
      if (board) board.innerHTML = html;
    }

    function teamMemberChips(asignados) {
      return (asignados || []).map(m => {
        const mm = MEMBER_META[m]; if (!mm) return '';
        return `<span class="tmember" style="background:${mm.color}1f;color:${mm.color};border:1px solid ${mm.color}55">${mm.label}</span>`;
      }).join('');
    }

    function teamTaskCard(t) {
      const em = ESTADO_META[t.estado] || ESTADO_META.por_hacer;
      const closed = (t.estado === 'hecha' || t.estado === 'cancelada');
      const prioIcon = { alta: '🔴', media: '🟡', baja: '🟢' }[t.prioridad];
      const prio = prioIcon ? `<span class="tchip" title="Prioridad ${t.prioridad}">${prioIcon}</span>` : '';
      const hora = t.hora ? `<span class="tchip">🕐 ${escapeHtml(t.hora.slice(0, 5))}</span>` : '';
      const remLbl = { 0: 'a la hora', 15: '15m antes', 30: '30m antes', 60: '1h antes' };
      const rem = (t.recordatorio_min !== null && t.recordatorio_min !== undefined) ? `<span class="tchip" title="Recordatorio">⏰ ${remLbl[t.recordatorio_min] || ''}</span>` : '';
      const dragged = (t._display && t._display !== t.fecha) ? `<span class="tchip tdrag" title="Arrastrada desde ${escapeHtml(t.fecha)}">↪ arrastrada</span>` : '';
      const nCount = Array.isArray(t.notas) ? t.notas.length : 0;
      const opts = TEAM_ESTADOS.map(s => `<option value="${s}"${s === t.estado ? ' selected' : ''}>${ESTADO_META[s].label}</option>`).join('');
      return `<div class="tcard${closed ? ' tcard-closed' : ''}" data-id="${t.id}" style="border-left-color:${em.color}">
        <div class="tcard-top">
          <span class="tcard-titulo">${escapeHtml(t.titulo)}</span>
          <button class="tcard-edit" data-edit="${t.id}" title="Editar">⋯</button>
        </div>
        <div class="tcard-meta">
          <select class="tcard-estado" data-estado="${t.id}" style="color:${em.color}">${opts}</select>
          ${prio}${hora}${rem}${dragged}
          <span class="tcard-asignados">${teamMemberChips(t.asignados)}</span>
          <button class="tcard-notas" data-notas="${t.id}" title="Notas">📝${nCount ? ' ' + nCount : ''}</button>
        </div>
      </div>`;
    }

    async function teamSetEstado(id, estado) {
      const { ok, data } = await api(`/api/tower/team?id=${encodeURIComponent(id)}`, { method: 'PATCH', body: JSON.stringify({ estado }) });
      if (ok && data?.ok) {
        const i = teamTasks.findIndex(t => t.id === id);
        if (i >= 0) teamTasks[i] = data.task;
        teamRenderBoard(teamDates);   // re-render: el cambio puede mover (arrastre) o cerrar la tarjeta
      } else { toast('No se pudo actualizar', 'error'); teamLoad(); }
    }

    function openTeamTaskModal(task, defaultFecha) {
      const isEdit = !!task;
      const f = task || {};
      const fecha = f.fecha || defaultFecha || isoLocal(new Date());
      const isChecked = (m) => (f.asignados || []).includes(m) ? 'checked' : '';
      const remCur = (f.recordatorio_min === null || f.recordatorio_min === undefined) ? '' : String(f.recordatorio_min);
      const remOpts = [['', 'Sin recordatorio'], ['0', 'A la hora'], ['15', '15 min antes'], ['30', '30 min antes'], ['60', '1 hora antes']].map(([v, l]) => `<option value="${v}"${v === remCur ? ' selected' : ''}>${l}</option>`).join('');
      const html = `
        <h2>${isEdit ? 'Editar tarea' : 'Nueva tarea'}</h2>
        <div class="field"><label>Tarea</label><input id="tk_titulo" type="text" placeholder="Ej: Campaña Meta Ads" autocomplete="off" required></div>
        <div class="form-grid-2">
          <div class="field"><label>Día</label><input id="tk_fecha" type="date" value="${fecha}" required></div>
          <div class="field"><label>Hora (opcional)</label><input id="tk_hora" type="time" value="${f.hora ? escapeHtml(f.hora.slice(0, 5)) : ''}"></div>
        </div>
        <div class="form-grid-2">
          <div class="field"><label>Estado</label><select id="tk_estado">${TEAM_ESTADOS.map(s => `<option value="${s}"${(f.estado || 'por_hacer') === s ? ' selected' : ''}>${ESTADO_META[s].label}</option>`).join('')}</select></div>
          <div class="field"><label>Prioridad</label><select id="tk_prio"><option value="">— sin prioridad</option>${['alta', 'media', 'baja'].map(p => `<option value="${p}"${f.prioridad === p ? ' selected' : ''}>${p}</option>`).join('')}</select></div>
        </div>
        <div class="field"><label>Recordatorio <span style="color:var(--text-muted);font-weight:400">(necesita hora)</span></label><select id="tk_rem">${remOpts}</select></div>
        <div class="field"><label>Asignar a</label><div class="tk-members">${Object.entries(MEMBER_META).map(([m, mm]) => `<label class="tk-mem"><input type="checkbox" class="tk_asig" value="${m}" ${isChecked(m)}> <span style="color:${mm.color};font-weight:600">${mm.label}</span></label>`).join('')}</div></div>
        <div class="modal-actions">
          ${isEdit ? '<button class="btn btn-danger-ghost" id="tk_del" style="margin-right:auto">Eliminar</button>' : ''}
          <button class="btn" data-modal-action="cancel">Cancelar</button>
          <button class="btn btn-primary-sm" id="tk_save">${isEdit ? 'Guardar' : 'Crear'}</button>
        </div>`;
      const back = document.createElement('div');
      back.className = 'modal-backdrop';
      back.innerHTML = `<div class="modal">${html}</div>`;
      document.body.appendChild(back);
      lockBodyScroll();
      const close = () => { back.remove(); unlockBodyScroll(); };
      back.addEventListener('click', (e) => { if (e.target === back || e.target.matches('[data-modal-action="cancel"]')) close(); });
      // Set título por propiedad (evita líos de escaping en el value).
      setTimeout(() => { const ti = back.querySelector('#tk_titulo'); if (ti) { if (isEdit) ti.value = f.titulo || ''; ti.focus(); } }, 50);

      back.querySelector('#tk_save').addEventListener('click', async () => {
        const titulo = back.querySelector('#tk_titulo').value.trim();
        const fechaV = back.querySelector('#tk_fecha').value;
        if (!titulo) { toast('Poné un título', 'error'); return; }
        if (!fechaV) { toast('Elegí un día', 'error'); return; }
        const payload = {
          titulo,
          fecha: fechaV,
          hora: back.querySelector('#tk_hora').value || null,
          estado: back.querySelector('#tk_estado').value,
          prioridad: back.querySelector('#tk_prio').value || null,
          recordatorio_min: back.querySelector('#tk_rem').value === '' ? null : parseInt(back.querySelector('#tk_rem').value, 10),
          asignados: [...back.querySelectorAll('.tk_asig:checked')].map(c => c.value),
        };
        const btn = back.querySelector('#tk_save'); btn.disabled = true; btn.textContent = 'Guardando…';
        const r = isEdit
          ? await api(`/api/tower/team?id=${encodeURIComponent(f.id)}`, { method: 'PATCH', body: JSON.stringify(payload) })
          : await api('/api/tower/team', { method: 'POST', body: JSON.stringify(payload) });
        if (r.ok && r.data?.ok) { toast(isEdit ? 'Tarea actualizada' : 'Tarea creada', 'success'); close(); teamLoad(); }
        else { btn.disabled = false; btn.textContent = isEdit ? 'Guardar' : 'Crear'; toast('No se pudo guardar', 'error'); }
      });

      if (isEdit) {
        back.querySelector('#tk_del').addEventListener('click', async () => {
          if (!confirm('¿Eliminar esta tarea? No se puede deshacer.')) return;
          const r = await api(`/api/tower/team?id=${encodeURIComponent(f.id)}`, { method: 'DELETE' });
          if (r.ok && r.data?.ok) { toast('Tarea eliminada', 'success'); close(); teamLoad(); }
          else toast('No se pudo eliminar', 'error');
        });
      }
    }

    function fmtNotaTs(ts) {
      try { const d = new Date(ts); return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`; }
      catch { return ''; }
    }

    function openTeamNotasModal(task) {
      const renderNota = (n) => {
        const mm = MEMBER_META[n.autor] || {};
        return `<div class="tnota"><div class="tnota-head"><span style="color:${mm.color || 'var(--text-muted)'}">${escapeHtml(mm.label || n.autor || '—')}</span><span class="tnota-ts">${fmtNotaTs(n.ts)}</span></div><div class="tnota-body">${escapeHtml(n.texto)}</div></div>`;
      };
      const notas = Array.isArray(task.notas) ? task.notas : [];
      const html = `
        <h2>Notas · ${escapeHtml(task.titulo)}</h2>
        <div class="tnotas-list" id="tnotasList">${notas.length ? notas.map(renderNota).join('') : '<div class="tday-empty">Sin notas todavía.</div>'}</div>
        <div class="field"><textarea id="tnota_input" placeholder="Escribí una nota para el equipo…"></textarea></div>
        <div class="modal-actions"><button class="btn" data-modal-action="cancel">Cerrar</button><button class="btn btn-primary-sm" id="tnota_add">Agregar nota</button></div>`;
      const back = document.createElement('div');
      back.className = 'modal-backdrop';
      back.innerHTML = `<div class="modal">${html}</div>`;
      document.body.appendChild(back);
      lockBodyScroll();
      const close = () => { back.remove(); unlockBodyScroll(); teamRenderBoard(teamDates); };  // refresca el contador 📝
      back.addEventListener('click', (e) => { if (e.target === back || e.target.matches('[data-modal-action="cancel"]')) close(); });
      back.querySelector('#tnota_add').addEventListener('click', async () => {
        const txt = back.querySelector('#tnota_input').value.trim(); if (!txt) return;
        const btn = back.querySelector('#tnota_add'); btn.disabled = true;
        const { ok, data } = await api(`/api/tower/team?id=${encodeURIComponent(task.id)}`, { method: 'PATCH', body: JSON.stringify({ addNota: txt }) });
        if (ok && data?.ok) {
          const i = teamTasks.findIndex(t => t.id === task.id); if (i >= 0) teamTasks[i] = data.task;
          task.notas = data.task.notas || [];
          const list = back.querySelector('#tnotasList');
          if (list) { const empty = list.querySelector('.tday-empty'); if (empty) list.innerHTML = ''; list.insertAdjacentHTML('beforeend', renderNota(task.notas[task.notas.length - 1])); list.scrollTop = list.scrollHeight; }
          back.querySelector('#tnota_input').value = ''; btn.disabled = false;
        } else { btn.disabled = false; toast('No se pudo agregar la nota', 'error'); }
      });
    }

    // ---------- Views: ALERTAS (bugs + dietas + errores de plan) ----------
    // Hub unificado de incidencias: bugs reportados por alumnos, alertas de
    // consistencia de dietas, y errores de guardado de planes. Cada item trae
    // el alumno + su tenant. Filtrable por tenant. Datos: /api/tower/bugs.
    async function renderAlertas(el) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Alertas</h1>
            <p class="page-sub">Bugs, alertas de dietas y errores de planes — por alumno y tenant. Las clientas no las ven.</p>
          </div>
          <div style="display:flex; gap:8px;">
            <select id="al_filter_tenant" class="btn">
              <option value="">Todos los tenants</option>
            </select>
            <select id="al_filter_source" class="btn">
              <option value="">Todos los tipos</option>
              <option value="bug">Bugs</option>
              <option value="dieta">Alertas de dieta</option>
              <option value="plan_error">Errores de plan</option>
            </select>
          </div>
        </div>
        <div id="alTotals" class="cards-grid"></div>
        <div id="alTable" class="table-wrap" style="margin-top:8px;"><div class="placeholder"><span class="spinner"></span> &nbsp; Cargando alertas…</div></div>
      `;
      _alTenantsLoaded = false;  // el innerHTML reseteó el <select> → re-poblarlo
      document.getElementById('al_filter_tenant').addEventListener('change', loadAlertas);
      document.getElementById('al_filter_source').addEventListener('change', loadAlertas);
      await loadAlertas();
    }

    let _alTenantsLoaded = false;
    async function loadAlertas() {
      const tenant = document.getElementById('al_filter_tenant')?.value || '';
      const srcFilter = document.getElementById('al_filter_source')?.value || '';
      const wrap = document.getElementById('alTable');
      const totalsEl = document.getElementById('alTotals');
      const qs = tenant ? ('?tenant=' + encodeURIComponent(tenant)) : '';
      const { ok, data } = await api('/api/tower/bugs' + qs);
      if (!ok || !data?.ok) {
        wrap.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      // Poblar el dropdown de tenants una sola vez (lo manda el endpoint).
      if (!_alTenantsLoaded && Array.isArray(data.tenants)) {
        const sel = document.getElementById('al_filter_tenant');
        if (sel) {
          for (const t of data.tenants) {
            const o = document.createElement('option');
            o.value = t.slug; o.textContent = t.name || t.slug;
            sel.appendChild(o);
          }
          _alTenantsLoaded = true;
        }
      }
      const c = data.counts || { total: 0, by_source: {} };
      const bs = c.by_source || {};
      totalsEl.innerHTML = `
        ${statCard('Alertas abiertas', fmtInt(c.total), 'Sin resolver')}
        ${statCard('Bugs', fmtInt(bs.bug || 0), 'Reportados por alumnos')}
        ${statCard('Alertas de dieta', fmtInt(bs.dieta || 0), 'Inconsistencias de plan')}
        ${statCard('Errores de plan', fmtInt(bs.plan_error || 0), 'Fallos al guardar/leer')}
      `;
      let rows = data.alerts || [];
      if (srcFilter) rows = rows.filter(r => r.source === srcFilter);
      if (!rows.length) {
        wrap.innerHTML = `<div class="placeholder"><strong>Sin alertas 🎯</strong>No hay incidencias abiertas${tenant ? ' para este tenant' : ''}.</div>`;
        return;
      }
      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Tipo</th>
            <th>Alumno</th>
            <th>Tenant</th>
            <th>Detalle</th>
            <th>Fecha</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${rows.map(r => renderAlertaRow(r)).join('')}
          </tbody>
        </table>
      `;
      wrap.querySelectorAll('[data-resolve]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.resolve;
          const src = btn.dataset.source;
          let resp;
          if (src === 'bug') {
            resp = await api('/api/tower/resolve_bug', { method: 'POST', body: JSON.stringify({ id }) });
          } else if (src === 'dieta') {
            resp = await api('/api/tower/dieta_alerts', { method: 'POST', body: JSON.stringify({ ids: [id], resolved: true }) });
          }
          if (resp && resp.ok) { toast('Alerta resuelta', 'success'); loadAlertas(); }
          else { toast('No se pudo resolver', 'error'); }
        });
      });
    }

    function renderAlertaRow(r) {
      const sevClass = r.severidad === 'error' ? 'badge-danger'
        : (r.severidad === 'warning' ? 'badge-warning' : 'badge');
      const tipoBadge = `<span class="badge ${sevClass}">${escapeHtml(r.tipo || r.source)}</span>`;
      const tenantTxt = r.tenant_nombre || r.tenant_slug || '—';
      const resolveBtn = r.resolvable
        ? `<button class="btn btn-primary-sm" data-resolve="${escapeHtml(r.id)}" data-source="${escapeHtml(r.source)}" title="Marcar como resuelta">✓</button>`
        : '<span class="cell-dim" title="Informativo (log de evento)">—</span>';
      return `
        <tr>
          <td>${tipoBadge}</td>
          <td>
            <div style="font-weight:500;">${escapeHtml(r.alumno_nombre || '—')}</div>
            <div class="cell-mono cell-dim" style="font-size:11px;">${escapeHtml(r.alumno_email || '')}</div>
          </td>
          <td>${escapeHtml(tenantTxt)}</td>
          <td style="max-width:340px;">${escapeHtml(r.detalle || '')}</td>
          <td class="cell-dim">${fmtRelative(r.fecha)}</td>
          <td class="cell-right">${resolveBtn}</td>
        </tr>
      `;
    }

        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Inicio</label>
            <input id="m_start" type="date" value="${today}" required>
          </div>
          <div class="field">
            <label>Tenant</label>
            <select id="m_tenant">
              <option value="">— Compartido</option>
              ${tenants.map(t => `<option value="${escapeHtml(t.id)}">${escapeHtml(t.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field">
          <label>Notas (opcional)</label>
          <textarea id="m_notes" placeholder="Detalle, factura, etc."></textarea>
        </div>
        <!-- Fin de período rara vez se usa; lo dejamos oculto. Si lo
             necesitás se setea desde la edición del row después de crear. -->
        <input type="hidden" id="m_end" value="">
        <div class="modal-actions">
          <button class="btn" data-modal-action="cancel">Cancelar</button>
          <button class="btn btn-primary-sm" id="m_save">Guardar</button>
        </div>
      `;
