<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#0B0F17" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F6F8FB" media="(prefers-color-scheme: light)">
  <title>TOWER — CoachAI</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/tower/icon-favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/tower/icon-192.png">

  <!-- PWA -->
  <link rel="manifest" href="/tower/manifest.json">
  <link rel="apple-touch-icon" href="/tower/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- "default" tells iOS NOT to overlay the status bar; iOS draws a normal
       status bar tinted by our theme-color, and our content starts below it.
       Avoids the entire "content under the status bar" problem. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TOWER">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Service worker lifecycle. Two responsibilities:
       1) Purge any leaked SW from the main CoachAI app (different scope but
          some browsers leak across hostnames if mistakenly registered).
       2) Register Tower's own SW (network-only — admin data must be fresh,
          we never want to serve stale cached HTML). The SW only enables
          installability + offline fallback, not caching of dynamic data. -->
  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;
      try {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          var hasStranger = false;
          regs.forEach(function(r){
            var scope = (r.scope || '').toLowerCase();
            // Anything not scoped to /tower/ on THIS origin is a stranger.
            if (scope.indexOf('/tower/') === -1) {
              r.unregister();
              hasStranger = true;
            }
          });
          if (hasStranger && window.caches && caches.keys) {
            caches.keys().then(function(keys){
              keys.forEach(function(k){
                if (k.indexOf('tower-') !== 0) caches.delete(k);
              });
              if (!sessionStorage.getItem('tower.swPurged')) {
                sessionStorage.setItem('tower.swPurged', '1');
                location.replace(location.pathname);
                return;
              }
            });
          }
          // Register Tower's SW (network-first, scoped to /tower/)
          window.addEventListener('load', function(){
            navigator.serviceWorker.register('/tower/sw.js', { scope: '/tower/' })
              .catch(function(){ /* non-fatal */ });
          });
        });
      } catch(_){}
    })();
  </script>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

  <style>
    /* ---------- THEME TOKENS ---------- */
    :root[data-theme="dark"] {
      --bg:           #0B0F17;
      --bg-elev:      #141A24;
      --bg-elev-2:    #1C2330;
      --border:       #2A3441;
      --border-soft:  #1F2733;
      --text:         #E8ECF3;
      --text-muted:   #8B95A7;
      --text-dim:     #4A5468;
      --accent:       #5B8DEF;
      --accent-hover: #7AA3F5;
      --accent-soft:  rgba(91, 141, 239, 0.12);
      --danger:       #EF4444;
      --warning:      #F59E0B;
      --success:      #22C55E;
      --neutral:      #6B7280;
      --shadow-card:  none;
      --input-bg:     #0F141D;
    }
    :root[data-theme="light"] {
      --bg:           #F6F8FB;
      --bg-elev:      #FFFFFF;
      --bg-elev-2:    #F0F3F8;
      --border:       #DCE2EA;
      --border-soft:  #E8EDF3;
      --text:         #121821;
      --text-muted:   #5C6877;
      --text-dim:     #9BA6B5;
      --accent:       #2563EB;
      --accent-hover: #1D4ED8;
      --accent-soft:  rgba(37, 99, 235, 0.10);
      --danger:       #DC2626;
      --warning:      #D97706;
      --success:      #16A34A;
      --neutral:      #6B7280;
      --shadow-card:  0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
      --input-bg:     #FFFFFF;
    }

    /* ---------- RESET / BASE ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.45;
    }
    .mono {
      font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    button { font: inherit; cursor: pointer; }

    /* ---------- LOGIN ---------- */
    .login-wrap {
      /* Fixed overlay on top of the app shell. The app stays mounted
         underneath so iOS keeps a stable layout (safe-area-insets are
         computed once and don't reflow on auth state changes). */
      position: fixed;
      inset: 0;
      z-index: 60;
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top, 0px));
      padding-bottom: max(24px, env(safe-area-inset-bottom, 0px));
      padding-left: max(24px, env(safe-area-inset-left, 0px));
      padding-right: max(24px, env(safe-area-inset-right, 0px));
      transition: opacity 0.18s ease, visibility 0.18s;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: var(--shadow-card);
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .login-brand svg { width: 28px; height: 28px; color: var(--accent); }
    .login-brand .wm {
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 15px;
    }
    .login-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 600;
    }
    .login-sub {
      margin: 0 0 24px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      display: none;
    }
    .login-error.show { display: block; }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .theme-toggle-floating {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-toggle-floating:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-toggle-floating svg { width: 16px; height: 16px; }

    /* ---------- APP SHELL ---------- */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .sidebar {
      background: var(--bg-elev);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      padding-top: max(16px, env(safe-area-inset-top, 0px));
      padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
      padding-left: max(12px, env(safe-area-inset-left, 0px));
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px 20px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 16px;
    }
    .sidebar-brand svg { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; }
    .sidebar-brand .wm {
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 13px;
    }
    .nav-section {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 14px 10px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover {
      background: var(--bg-elev-2);
      color: var(--text);
    }
    .nav-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-foot {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
    }
    .sidebar-foot .name {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      transition: background 0.12s, color 0.12s;
    }
    .icon-btn:hover { background: var(--bg-elev-2); color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      padding-top: env(safe-area-inset-top, 0px);
      padding-right: max(24px, env(safe-area-inset-right, 0px));
      height: calc(48px + env(safe-area-inset-top, 0px));
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .crumb {
      font-size: 13px;
      color: var(--text-muted);
    }
    .crumb strong {
      color: var(--text);
      font-weight: 500;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .content {
      padding: 28px 32px;
      padding-bottom: max(28px, env(safe-area-inset-bottom, 0px));
      padding-right: max(32px, env(safe-area-inset-right, 0px));
      overflow-y: auto;
    }
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .page-sub {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .placeholder {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 60px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      background: var(--bg-elev);
    }
    .placeholder strong {
      display: block;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: var(--shadow-card);
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }
    .stat-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ---------- TRAFFIC LIGHT ---------- */
    .tl {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .tl-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-green  .tl-dot { background: var(--success); box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
    .tl-yellow .tl-dot { background: var(--warning); box-shadow: 0 0 6px rgba(245, 158, 11, 0.5); }
    .tl-red    .tl-dot { background: var(--danger);  box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }
    .tl-gray   .tl-dot { background: var(--neutral); }

    /* ---------- UTILS ---------- */
    .hidden { display: none !important; }
    /* Soft hide: keeps element in the layout (preserves iOS safe-area-inset
       computation) but invisible and non-interactive. Used for login/app
       transitions so we never trigger a display:none → display:block cycle
       that confuses iOS PWA viewport metrics. */
    .faded {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* boot loader — sits above everything until checkSession resolves */
    .boot {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      z-index: 80;
      transition: opacity 0.15s ease, visibility 0.15s;
    }

    /* ---------- TABLES ---------- */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
    }
    .data-table tbody td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr {
      cursor: default;
      transition: background 0.1s;
    }
    .data-table tbody tr.clickable { cursor: pointer; }
    .data-table tbody tr.clickable:hover { background: var(--bg-elev-2); }
    .data-table .cell-mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 12px; }
    .data-table .cell-dim  { color: var(--text-dim); }
    .data-table .cell-right { text-align: right; }
    .table-wrap { overflow-x: auto; }

    /* ---------- BADGES ---------- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--bg-elev-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .badge-accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
    .badge-success { background: rgba(34,197,94,0.12); color: var(--success); border-color: transparent; }
    .badge-warning { background: rgba(245,158,11,0.12); color: var(--warning); border-color: transparent; }
    .badge-danger  { background: rgba(239,68,68,0.12);  color: var(--danger);  border-color: transparent; }

    /* ---------- BUTTONS ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { background: var(--bg-elev-2); border-color: var(--text-muted); }
    .btn-primary-sm {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary-sm:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-danger-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--danger);
      padding: 4px 8px;
    }
    .btn-danger-ghost:hover { background: rgba(239,68,68,0.10); }
    .btn-back {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 4px 0;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }
    .btn-back:hover { color: var(--text); }

    /* ---------- MODAL ---------- */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      display: grid; place-items: center;
      z-index: 100;
    }
    :root[data-theme="light"] .modal-backdrop { background: rgba(15,23,42,0.35); }
    .modal {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal h2 {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 600;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .field select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
    }
    .field textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ---------- DRILL HEADER ---------- */
    .drill-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .drill-title { display: flex; align-items: center; gap: 10px; }
    .drill-title .swatch {
      width: 28px; height: 28px; border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-row strong { color: var(--text); font-weight: 500; }

    /* ---------- BUGS DETAIL ---------- */
    .bug-item {
      padding: 10px 12px;
      background: rgba(239,68,68,0.05);
      border-left: 2px solid var(--danger);
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .bug-item .bug-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ---------- EMPTY STATE ---------- */
    .empty-row {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ---------- TOAST ---------- */
    .toast-stack {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom, 0px));
      right: max(24px, env(safe-area-inset-right, 0px));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }
    .toast {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      animation: slideIn 0.2s ease-out;
    }
    .toast-error { border-color: var(--danger); color: var(--danger); }
    .toast-success { border-color: var(--success); color: var(--success); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ---------- HAMBURGER (mobile) ---------- */
    .hamburger {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .hamburger svg { width: 16px; height: 16px; }
    .hamburger:active { background: var(--bg-elev-2); }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 49;
    }
    :root[data-theme="light"] .sidebar-overlay { background: rgba(15,23,42,0.35); }

    /* Topbar mobile branding (hidden on desktop, replaces sidebar logo on mobile) */
    .topbar-brand {
      display: none;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 13px;
    }
    .topbar-brand svg { width: 18px; height: 18px; color: var(--accent); }

    /* ---------- RESPONSIVE BREAKPOINTS ---------- */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 260px;
        max-width: 80vw;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.2s ease-out;
        box-shadow: 4px 0 24px rgba(0,0,0,0.3);
      }
      .app.menu-open .sidebar {
        transform: translateX(0);
      }
      .app.menu-open .sidebar-overlay {
        display: block;
      }
      .hamburger { display: inline-flex; }
      .topbar-brand { display: inline-flex; }
      .topbar {
        padding-left: 12px;
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }
      .crumb { display: none; }
      .content {
        padding: 16px 12px;
        padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }
      .page-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        margin-bottom: 16px;
      }
      .page-title { font-size: 18px; }
      .page-sub { font-size: 12px; }

      .cards-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .stat-card { padding: 14px; }
      .stat-value { font-size: 20px; }

      .data-table thead th { padding: 8px 10px; font-size: 9px; }
      .data-table tbody td { padding: 10px 10px; font-size: 12px; }

      .modal {
        max-height: 96vh;
        margin: 8px;
        padding: 20px 18px;
      }
      .form-grid-2 {
        grid-template-columns: 1fr;
      }

      .drill-header {
        flex-direction: column;
        gap: 8px;
      }

      .toast-stack {
        bottom: 12px;
        right: 12px;
        left: 12px;
      }
      .toast { font-size: 12px; }

      /* Login on mobile: full bleed, smaller paddings */
      .login-card {
        padding: 28px 20px;
        border-radius: 14px;
      }

    }

    @media (max-width: 420px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }

    /* PWA standalone tweaks (avoid iOS bouncing white area) */
    @media (display-mode: standalone) {
      html, body { background: var(--bg); overscroll-behavior-y: none; }
    }
  </style>
</head>
<body>

  <!-- Boot loader (shown until /me responds) -->
  <div id="boot" class="boot">
    <div><span class="spinner"></span> &nbsp; TOWER</div>
  </div>

  <!-- Login screen — overlay on top of app, hidden via opacity not display
       so the underlying app shell keeps its layout & safe-area-insets. -->
  <div id="login" class="login-wrap faded">
    <button id="loginThemeToggle" class="theme-toggle-floating" title="Cambiar tema" aria-label="Cambiar tema">
      <svg id="loginThemeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
    </button>

    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="login-brand">
        <!-- Chess rook icon -->
        <svg viewBox="0 0 1000 1000" fill="currentColor" aria-hidden="true">
          <path d="M 220 80 L 350 80 L 350 180 L 430 180 L 430 80 L 570 80 L 570 180 L 650 180 L 650 80 L 780 80 L 780 220 L 820 240 L 820 290 L 180 290 L 180 240 L 220 220 Z M 290 290 L 710 290 L 670 360 L 670 420 C 670 510, 700 580, 740 660 L 260 660 C 300 580, 330 510, 330 420 L 330 360 Z M 180 660 L 820 660 L 820 760 L 880 760 L 880 880 L 120 880 L 120 760 L 180 760 Z"/>
        </svg>

      </div>
      <div class="field">
        <label for="loginPass">Contraseña</label>
        <input id="loginPass" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button type="submit" id="loginSubmit" class="btn-primary">Ingresar</button>

      <div id="loginError" class="login-error"></div>

      <div class="login-footer">COACHAI · TOWER · v0.6</div>
    </form>
  </div>

  <!-- App shell — always mounted so iOS computes safe-area-insets once.
       'faded' is the initial state (invisible until session check passes). -->
  <div id="app" class="app faded">
    <div id="sidebarOverlay" class="sidebar-overlay" aria-hidden="true"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg viewBox="0 0 1000 1000" fill="currentColor" aria-hidden="true">
          <path d="M 220 80 L 350 80 L 350 180 L 430 180 L 430 80 L 570 80 L 570 180 L 650 180 L 650 80 L 780 80 L 780 220 L 820 240 L 820 290 L 180 290 L 180 240 L 220 220 Z M 290 290 L 710 290 L 670 360 L 670 420 C 670 510, 700 580, 740 660 L 260 660 C 300 580, 330 510, 330 420 L 330 360 Z M 180 660 L 820 660 L 820 760 L 880 760 L 880 880 L 120 880 L 120 760 L 180 760 Z"/>
        </svg>
        <span class="wm">TOWER</span>

      <div class="nav-section">General</div>

      </div>

      <div class="nav-section">Sistema</div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="13" y2="17"></line></svg>

        Configuración
      </div>

      <div class="sidebar-foot">
        <div id="userAvatar" class="avatar">?</div>
        <div id="userName" class="name">—</div>
        <button id="themeToggle" class="icon-btn" title="Cambiar tema" aria-label="Cambiar tema">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
        </button>
        <button id="logoutBtn" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>

    </aside>

    <section class="main">
      <header class="topbar">
        <div style="display:flex; align-items:center; gap:10px; min-width:0;">
          <button id="hamburgerBtn" class="hamburger" aria-label="Abrir menú">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <div class="topbar-brand">
            <svg viewBox="0 0 1000 1000" fill="currentColor" aria-hidden="true"><path d="M 220 80 L 350 80 L 350 180 L 430 180 L 430 80 L 570 80 L 570 180 L 650 180 L 650 80 L 780 80 L 780 220 L 820 240 L 820 290 L 180 290 L 180 240 L 220 220 Z M 290 290 L 710 290 L 670 360 L 670 420 C 670 510, 700 580, 740 660 L 260 660 C 300 580, 330 510, 330 420 L 330 360 Z M 180 660 L 820 660 L 820 760 L 880 760 L 880 880 L 120 880 L 120 760 L 180 760 Z"/></svg>

        </div>
      </header>

      <main id="content" class="content">
        <!-- Routed content -->
      </main>
    </section>
  </div>

  <script>
  (() => {
    // ---------- Theme ----------
    const THEME_KEY = 'tower.theme';
    const root = document.documentElement;
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      try { localStorage.setItem(THEME_KEY, t); } catch {}
      updateThemeIcons(t);
    }
    function updateThemeIcons(t) {
      const moon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
      const sun  = `<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>`;
      const svg = t === 'dark' ? sun : moon;
      const a = document.getElementById('themeIcon');
      const b = document.getElementById('loginThemeIcon');
      if (a) a.innerHTML = svg;
      if (b) b.innerHTML = svg;
    }
    function toggleTheme() {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    }
    function initTheme() {
      let t = null;
      try { t = localStorage.getItem(THEME_KEY); } catch {}
      if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      applyTheme(t);
    }
    initTheme();

    document.addEventListener('click', (e) => {
      const tt = e.target.closest('#themeToggle, #loginThemeToggle');
      if (tt) { e.preventDefault(); toggleTheme(); }
    });

    // ---------- DOM refs ----------
    const $ = (sel) => document.querySelector(sel);
    const boot = $('#boot');
    const loginEl = $('#login');
    const appEl = $('#app');
    const loginForm = $('#loginForm');
    const loginError = $('#loginError');
    const loginSubmit = $('#loginSubmit');
    const userAvatar = $('#userAvatar');
    const userName = $('#userName');
    const contentEl = $('#content');
    const crumbEl = $('#crumb');
    const logoutBtn = $('#logoutBtn');

    // ---------- Auth flow ----------
    let session = null;

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        ...opts,
      });
      let data = null;
      try { data = await res.json(); } catch {}
      return { ok: res.ok, status: res.status, data };
    }

    function showError(msg) {
      loginError.textContent = msg;
      loginError.classList.add('show');
    }
    function clearError() {
      loginError.textContent = '';
      loginError.classList.remove('show');
    }

    async function checkSession() {
      const { ok, data } = await api('/api/tower/me');
      if (ok && data && data.ok) {
        session = data.user;
        enterApp();
      } else {
        showLogin();
      }
    }

    // Safety-net nudge: forces a synthetic layout pass. With the new
    // overlay architecture (app always mounted, login fades over it) this
    // rarely matters, but it's cheap and helps on edge cases (rotating
    // the device, returning from background, etc).
    function nudgeViewport() {
      requestAnimationFrame(() => {
        window.dispatchEvent(new Event('resize'));
        requestAnimationFrame(() => { void document.body.offsetHeight; });
      });
    }

    function showLogin() {
      boot.classList.add('faded');
      appEl.classList.add('faded');
      loginEl.classList.remove('faded');
      setTimeout(() => $('#loginUser')?.focus(), 50);
    }

    function enterApp() {
      boot.classList.add('faded');
      loginEl.classList.add('faded');
      appEl.classList.remove('faded');
      userName.textContent = session.displayName || session.username;
      userAvatar.textContent = (session.displayName || session.username || '?').charAt(0).toUpperCase();
      route('dashboard');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const username = $('#loginUser').value.trim();
      const password = $('#loginPass').value;
      if (!username || !password) { showError('Completá usuario y contraseña.'); return; }
      loginSubmit.disabled = true;
      loginSubmit.innerHTML = '<span class="spinner"></span> Verificando...';
      const { ok, status, data } = await api('/api/tower/login', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });
      loginSubmit.disabled = false;
      loginSubmit.textContent = 'Ingresar';
      if (ok && data && data.ok) {
        session = data.user;
        $('#loginPass').value = '';
        enterApp();
      } else if (status === 401) {
        showError('Usuario o contraseña incorrectos.');
      } else {
        showError('No se pudo iniciar sesión. Probá de nuevo.');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await api('/api/tower/logout', { method: 'POST' });
      session = null;
      showLogin();
    });

    // ---------- Utilities ----------
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function fmtUsd(n) {
      const v = Number(n || 0);
      return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function fmtInt(n) {
      return Number(n || 0).toLocaleString('en-US');
    }
    function fmtRelative(iso) {
      if (!iso) return '—';
      const t = new Date(iso).getTime();
      if (!Number.isFinite(t)) return '—';
      const diff = Date.now() - t;
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return 'hace ' + sec + 's';
      const min = Math.floor(sec / 60);
      if (min < 60) return 'hace ' + min + ' min';
      const hr = Math.floor(min / 60);
      if (hr < 24) return 'hace ' + hr + ' h';
      const d = Math.floor(hr / 24);
      if (d < 30) return 'hace ' + d + ' d';
      const mo = Math.floor(d / 30);
      if (mo < 12) return 'hace ' + mo + ' meses';
      return 'hace ' + Math.floor(mo / 12) + ' años';
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (!Number.isFinite(d.getTime())) return iso;
      return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    function tlBadge(tl) {
      if (!tl) return '<span class="tl tl-gray"><span class="tl-dot"></span>—</span>';
      const cls = 'tl-' + (tl.color || 'gray');
      return `<span class="tl ${cls}" title="${escapeHtml(tl.reason || '')}"><span class="tl-dot"></span>${escapeHtml(tl.reason || '')}</span>`;
    }
    function todayIso() {
      return new Date().toISOString().slice(0, 10);
    }

    // ---------- Toasts ----------
    function ensureToastStack() {
      let s = document.getElementById('toastStack');
      if (!s) {
        s = document.createElement('div');
        s.id = 'toastStack';
        s.className = 'toast-stack';
        document.body.appendChild(s);
      }
      return s;
    }
    function toast(msg, type = '') {
      const s = ensureToastStack();
      const el = document.createElement('div');
      el.className = 'toast' + (type ? ' toast-' + type : '');
      el.textContent = msg;
      s.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 3500);
    }

    // ---------- Modal ----------
    function modal(html) {
      return new Promise((resolve) => {
        const back = document.createElement('div');
        back.className = 'modal-backdrop';
        back.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${html}</div>`;
        document.body.appendChild(back);
        const close = (result) => {
          back.remove();
          resolve(result);
        };
        back.addEventListener('click', (e) => {
          if (e.target === back) close(null);
          if (e.target.matches('[data-modal-action="cancel"]')) close(null);
        });
        // Expose close to the caller so they can finalize on submit
        back._close = close;
        // Focus first input
        setTimeout(() => back.querySelector('input,select,textarea,button')?.focus(), 50);
      });
    }

    // ---------- Routing ----------
    let currentTenantSlug = null;

    const ROUTES = {
      dashboard:    { label: 'Dashboard',     render: renderDashboard },
      tenants:      { label: 'Tenants',       render: renderTenantsList },
      users:        { label: 'Usuarios',      render: () => placeholder('Usuarios', 'Vista global de todos los usuarios (across tenants). Llega luego — entrá por Tenants → click un tenant para ver sus usuarios.') },
      financiero:   { label: 'Financiero',    render: () => placeholder('Financiero', 'Suscripciones, pagos, vencimientos. Stripe + Mercado Pago + transferencia manual. Fase 4–6.') },
      costos:       { label: 'API / Costos',  render: renderCostos },
      logs:         { label: 'Logs',          render: () => placeholder('Logs', 'Eventos del sistema, errores, bug reports de usuarios. Próxima iteración.') },
      config:       { label: 'Configuración', render: () => placeholder('Configuración', 'Precios por tenant, splits, notificaciones, alertas internas.') },
    };

    function route(name, extra) {
      const r = ROUTES[name] || ROUTES.dashboard;
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.route === name);
      });
      crumbEl.innerHTML = `<strong>${r.label}</strong>`;
      contentEl.innerHTML = '';
      r.render(contentEl, extra);
    }

    document.addEventListener('click', (e) => {
      const ni = e.target.closest('.nav-item');
      if (ni && ni.dataset.route) {
        currentTenantSlug = null;
        route(ni.dataset.route);
        closeMobileMenu(); // auto-collapse on mobile after picking a section
      }
    });

    // ---------- Mobile menu ----------
    function openMobileMenu()  { appEl.classList.add('menu-open'); }
    function closeMobileMenu() { appEl.classList.remove('menu-open'); }
    function toggleMobileMenu(){ appEl.classList.toggle('menu-open'); }
    document.addEventListener('click', (e) => {
      if (e.target.closest('#hamburgerBtn'))     { e.preventDefault(); toggleMobileMenu(); }
      if (e.target.closest('#sidebarOverlay'))   { closeMobileMenu(); }
    });
    // Close on ESC + on hash change
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeMobileMenu();
    });

    // ---------- Views: placeholder ----------
    function placeholder(title, body) {
      contentEl.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">${escapeHtml(title)}</h1>
            <p class="page-sub">Sección en construcción.</p>
          </div>
        </div>
        <div class="placeholder">
          <strong>Próximamente</strong>
          ${escapeHtml(body)}
        </div>
      `;
    }

    // ---------- Views: DASHBOARD ----------
    async function renderDashboard() {
      contentEl.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Bienvenido${session?.displayName ? ', ' + escapeHtml(session.displayName) : ''}</h1>
            <p class="page-sub">Resumen general del ecosistema CoachAI.</p>
          </div>
        </div>
        <div id="dashGrid" class="cards-grid"></div>
        <div id="dashTl" class="cards-grid"></div>
      `;

      const grid = document.getElementById('dashGrid');
      const tl   = document.getElementById('dashTl');

      // Skeleton
      grid.innerHTML = `
        ${statCardSkeleton('Tenants activos')}
        ${statCardSkeleton('Usuarios totales')}
        ${statCardSkeleton('Activos (7d)')}
        ${statCardSkeleton('Bugs reportados')}
        ${statCardSkeleton('Costo mensual proyectado')}
      `;

      const { ok, data } = await api('/api/tower/dashboard');
      if (!ok || !data?.ok) {
        grid.innerHTML = `<div class="stat-card"><div class="stat-label">Error</div><div class="stat-sub">${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div></div>`;
        return;
      }
      const s = data.stats;

      grid.innerHTML = `
        ${statCard('Tenants activos', fmtInt(s.tenants.active), `${fmtInt(s.tenants.total)} totales`)}
        ${statCard('Usuarios totales', fmtInt(s.users.total), `${fmtInt(s.users.active_7d)} activos en 7d`)}
        ${statCard('Activos (7d)', fmtInt(s.users.active_7d), `${pct(s.users.active_7d, s.users.total)} del total`)}
        ${statCard('Bugs reportados', fmtInt(s.bugs.total), `${fmtInt(s.bugs.last_30d)} en últimos 30d`)}
        ${statCard('Costo mensual proyectado', fmtUsd(s.costs.monthly_projected_usd), 'Cuotas activas + recurrentes')}
      `;

      const b = s.traffic_light;
      tl.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Distribución de tenants</div>
          <div style="display:flex; gap:14px; align-items:center; margin-top:4px;">
            <span class="tl tl-green"><span class="tl-dot"></span>${fmtInt(b.green)}</span>
            <span class="tl tl-yellow"><span class="tl-dot"></span>${fmtInt(b.yellow)}</span>
            <span class="tl tl-red"><span class="tl-dot"></span>${fmtInt(b.red)}</span>
            <span class="tl tl-gray"><span class="tl-dot"></span>${fmtInt(b.gray)}</span>
          </div>
          <div class="stat-sub">Verde · Amarillo · Rojo · Gris</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Versión Tower</div>
          <div class="stat-value mono" style="font-size:16px;">v0.6.0</div>
          <div class="stat-sub">Overlay arquitectura</div>
        </div>
      `;
    }

    function pct(n, total) {
      if (!total) return '—';
      return Math.round((n / total) * 100) + '%';
    }
    function statCard(label, value, sub) {
      return `<div class="stat-card">
        <div class="stat-label">${escapeHtml(label)}</div>
        <div class="stat-value">${value}</div>
        <div class="stat-sub">${escapeHtml(sub || '')}</div>
      </div>`;
    }
    function statCardSkeleton(label) {
      return `<div class="stat-card">
        <div class="stat-label">${escapeHtml(label)}</div>
        <div class="stat-value"><span class="spinner"></span></div>
        <div class="stat-sub">cargando…</div>
      </div>`;
    }

    // ---------- Views: TENANTS ----------
    async function renderTenantsList(el) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Tenants</h1>
            <p class="page-sub">Todas las cuentas de CoachAI. Click en una fila para ver sus usuarios.</p>
          </div>
        </div>
        <div id="tenantsTable" class="table-wrap"><div class="placeholder"><span class="spinner"></span> &nbsp; Cargando tenants…</div></div>
      `;
      const wrap = document.getElementById('tenantsTable');
      const { ok, data } = await api('/api/tower/tenants');
      if (!ok || !data?.ok) {
        wrap.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      const rows = data.tenants;
      if (!rows.length) {
        wrap.innerHTML = `<div class="placeholder">Sin tenants registrados.</div>`;
        return;
      }
      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Estado</th>
            <th>Tenant</th>
            <th>Tipo</th>
            <th>Dominio</th>
            <th class="cell-right">Usuarios</th>
            <th>Última actividad</th>
          </tr></thead>
          <tbody>
            ${rows.map(t => `
              <tr class="clickable" data-slug="${escapeHtml(t.slug)}">
                <td>${tlBadge(t.traffic_light)}</td>
                <td>
                  <div style="display:flex; align-items:center; gap:10px;">
                    ${t.brand?.accent ? `<span class="swatch" style="width:18px;height:18px;border-radius:4px;background:${escapeHtml(t.brand.accent)};border:1px solid var(--border);display:inline-block;"></span>` : ''}
                    <div>
                      <div style="font-weight:500;">${escapeHtml(t.name)}</div>
                      <div class="cell-mono cell-dim" style="font-size:11px;">${escapeHtml(t.slug)}</div>
                    </div>
                  </div>
                </td>
                <td>
                  ${t.is_cofounder ? '<span class="badge badge-accent">co-founder</span>' : ''}
                  ${t.is_whitelabel ? '<span class="badge">whitelabel</span>' : '<span class="badge">default</span>'}
                </td>
                <td class="cell-mono">${t.domain ? escapeHtml(t.domain) : '<span class="cell-dim">—</span>'}</td>
                <td class="cell-right cell-mono">
                  ${fmtInt(t.users.total)}${t.users.capacity ? ' / ' + fmtInt(t.users.capacity) : ' / ∞'}
                  <div class="cell-dim" style="font-size:11px;">${fmtInt(t.users.active_7d)} activos 7d</div>
                </td>
                <td class="cell-dim">${fmtRelative(t.last_activity)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      wrap.querySelectorAll('tr.clickable').forEach(tr => {
        tr.addEventListener('click', () => openTenantDrill(tr.dataset.slug));
      });
    }

    async function openTenantDrill(slug) {
      currentTenantSlug = slug;
      crumbEl.innerHTML = `<a href="#" id="crumbBack">Tenants</a> · <strong>${escapeHtml(slug)}</strong>`;
      document.getElementById('crumbBack')?.addEventListener('click', (e) => {
        e.preventDefault();
        currentTenantSlug = null;
        route('tenants');
      });
      contentEl.innerHTML = `<div class="placeholder"><span class="spinner"></span> &nbsp; Cargando ${escapeHtml(slug)}…</div>`;

      const { ok, data } = await api(`/api/tower/users?tenant=${encodeURIComponent(slug)}`);
      if (!ok || !data?.ok) {
        contentEl.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      const tenant = data.tenant;
      const users = data.users;

      contentEl.innerHTML = `
        <button class="btn-back" id="backBtn">← Volver a Tenants</button>
        <div class="drill-header">
          <div>
            <div class="drill-title">
              <h1 class="page-title">${escapeHtml(tenant.name)}</h1>
            </div>
            <div class="meta-row">
              <span><strong>${escapeHtml(tenant.slug)}</strong></span>
              <span>${fmtInt(users.length)} usuarios</span>
            </div>
          </div>
        </div>
        <div class="table-wrap">
          ${users.length === 0 ? '<div class="placeholder">Sin usuarios todavía.</div>' : `
          <table class="data-table">
            <thead><tr>
              <th>Estado</th>
              <th>Usuario</th>
              <th>Última actividad</th>
              <th class="cell-right">Adherencia</th>
              <th class="cell-right">Entrenó (30d)</th>
              <th class="cell-right">Sesiones</th>
              <th class="cell-right">Bugs</th>
            </tr></thead>
            <tbody>
              ${users.map(u => `
                <tr class="clickable" data-uid="${escapeHtml(u.id)}">
                  <td>${tlBadge(u.traffic_light)}</td>
                  <td>
                    <div style="font-weight:500;">${escapeHtml(u.nombre || u.email)}</div>
                    <div class="cell-mono cell-dim" style="font-size:11px;">${escapeHtml(u.email)}</div>
                  </td>
                  <td class="cell-dim">${fmtRelative(u.last_active)}</td>
                  <td class="cell-right cell-mono">${u.stats.adherence != null ? Math.round(u.stats.adherence * 100) + '%' : '—'}</td>
                  <td class="cell-right cell-mono">${fmtInt(u.stats.daysTrained30d)}${u.stats.weeklyTarget ? ' <span class="cell-dim">/ ' + (u.stats.weeklyTarget * 4) + '</span>' : ''}</td>
                  <td class="cell-right cell-mono">${fmtInt(u.session_count)}</td>
                  <td class="cell-right">
                    ${u.stats.openBugs > 0 ? `<span class="badge badge-danger">${u.stats.openBugs}</span>` : '<span class="cell-dim">0</span>'}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
        </div>
        ${renderBugsBlock(users)}
      `;
      document.getElementById('backBtn').addEventListener('click', () => { currentTenantSlug = null; route('tenants'); });
    }

    function renderBugsBlock(users) {
      const allBugs = [];
      users.forEach(u => {
        (u.bugs || []).forEach(b => allBugs.push({ ...b, usuario: u.nombre || u.email }));
      });
      if (!allBugs.length) return '';
      return `
        <div style="margin-top:32px;">
          <h2 style="font-size:14px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin:0 0 12px;">
            Bugs reportados
          </h2>
          ${allBugs.map(b => `
            <div class="bug-item">
              <div>${escapeHtml(b.mensaje)}</div>
              <div class="bug-meta">${escapeHtml(b.usuario)} · ${fmtRelative(b.created_at)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ---------- Views: COSTOS ----------
    let _tenantsCache = null;
    async function loadTenantsForSelect() {
      if (_tenantsCache) return _tenantsCache;
      const { data } = await api('/api/tower/tenants');
      _tenantsCache = (data?.tenants || []).map(t => ({ id: t.id, slug: t.slug, name: t.name }));
      return _tenantsCache;
    }

    async function renderCostos(el) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Costos</h1>
            <p class="page-sub">Registro manual de gastos. Infraestructura compartida y costos atribuidos a un tenant.</p>
          </div>
          <button class="btn btn-primary-sm" id="addCostBtn">+ Nuevo costo</button>
        </div>
        <div id="costsTotals" class="cards-grid"></div>
        <div id="costsTable" class="table-wrap" style="margin-top:8px;"><div class="placeholder"><span class="spinner"></span> &nbsp; Cargando…</div></div>
      `;
      document.getElementById('addCostBtn').addEventListener('click', openAddCostModal);
      await loadCostsTable();
    }

    function freqLabel(period, installments) {
      const base = { monthly: 'Mensual', yearly: 'Anual', 'one-time': 'Único' }[period] || period;
      if (period === 'one-time' && installments > 1) return `${installments} cuotas`;
      return base;
    }

    function renderCostRow(r) {
      const progress = r.installments_progress;
      const monthlyCell = r.monthly_usd > 0
        ? `<span class="cell-mono">${fmtUsd(r.monthly_usd)}</span>${progress ? `<div class="cell-dim" style="font-size:11px;">cuota ${progress.paid}/${progress.total}</div>` : ''}`
        : `<span class="cell-dim">—</span>${progress ? `<div class="cell-dim" style="font-size:11px;">${progress.paid}/${progress.total} pagadas</div>` : ''}`;
      const freq = freqLabel(r.billing_period, r.installments);
      const tenantCell = r.tenants
        ? `<span class="badge badge-accent">${escapeHtml(r.tenants.slug)}</span>`
        : '<span class="cell-dim">— compartido</span>';
      const endRange = r.period_end
        ? `<div class="cell-dim" style="font-size:11px;">→ ${fmtDate(r.period_end)}</div>`
        : '';
      const notes = r.notes ? `<div class="cell-dim" style="font-size:11px;">${escapeHtml(r.notes)}</div>` : '';
      return `
        <tr data-id="${escapeHtml(r.id)}">
          <td class="cell-mono">${fmtDate(r.period_start)}${endRange}</td>
          <td>
            <div style="font-weight:500;">${escapeHtml(r.label)}</div>
            ${notes}
          </td>
          <td><span class="badge">${escapeHtml(r.provider)}</span></td>
          <td>${tenantCell}</td>
          <td class="cell-dim">${escapeHtml(freq)}</td>
          <td class="cell-right cell-mono">${fmtUsd(r.amount_usd)}</td>
          <td class="cell-right">${monthlyCell}</td>
          <td class="cell-right">
            <button class="btn btn-danger-ghost" data-delete="${escapeHtml(r.id)}" title="Eliminar">×</button>
          </td>
        </tr>
      `;
    }

    async function loadCostsTable() {
      const wrap = document.getElementById('costsTable');
      const totalsEl = document.getElementById('costsTotals');
      const { ok, data } = await api('/api/tower/costs');
      if (!ok || !data?.ok) {
        wrap.innerHTML = `<div class="placeholder"><strong>Error</strong>${escapeHtml(data?.detail || data?.error || 'No se pudo cargar')}</div>`;
        return;
      }
      const rows = data.costs;
      const t = data.totals;
      totalsEl.innerHTML = `
        ${statCard('Mensual proyectado', fmtUsd(t.monthly_projected_usd), 'Este mes — cuotas + recurrentes activos')}
        ${statCard('Mensual compartido', fmtUsd(t.monthly_shared_usd), 'Infraestructura compartida')}
        ${statCard('Mensual atribuido', fmtUsd(t.monthly_attributed_usd), 'Atribuido a tenants')}
        ${statCard('Acumulado histórico', fmtUsd(t.usd), `${fmtInt(t.count)} registros totales`)}
      `;
      if (!rows.length) {
        wrap.innerHTML = `<div class="placeholder"><strong>Sin costos registrados</strong>Cargá el primero con el botón "+ Nuevo costo".</div>`;
        return;
      }
      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Período</th>
            <th>Concepto</th>
            <th>Proveedor</th>
            <th>Tenant</th>
            <th>Frecuencia</th>
            <th class="cell-right">Monto total</th>
            <th class="cell-right">Mensualizado</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${rows.map(r => renderCostRow(r)).join('')}
          </tbody>
        </table>
      `;
      wrap.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('¿Eliminar este registro de costo?')) return;
          const id = btn.dataset.delete;
          const { ok } = await api(`/api/tower/costs?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
          if (ok) { toast('Costo eliminado', 'success'); loadCostsTable(); }
          else { toast('No se pudo eliminar', 'error'); }
        });
      });
    }

    async function openAddCostModal() {
      const tenants = await loadTenantsForSelect();
      const today = todayIso();
      const providers = ['vercel','supabase','resend','anthropic','godaddy','stripe','mercadopago','otro'];

      const html = `
        <h2>Nuevo costo</h2>
        <div class="field">
          <label>Concepto</label>
          <input id="m_label" type="text" placeholder="Ej: Vercel Pro · mayo" autocomplete="off" required>
        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Proveedor</label>
            <select id="m_provider">
              ${providers.map(p => `<option value="${p}">${p}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Monto (USD)</label>
            <input id="m_amount" type="number" step="0.01" min="0" placeholder="0.00" required>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Inicio de período</label>
            <input id="m_start" type="date" value="${today}" required>
          </div>
          <div class="field">
            <label>Fin de período (opcional)</label>
            <input id="m_end" type="date">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Frecuencia</label>
            <select id="m_period">
              <option value="monthly">Mensual</option>
              <option value="yearly">Anual (se mensualiza ÷12)</option>
              <option value="one-time">Único / Cuotas</option>
            </select>
          </div>
          <div class="field" id="m_installments_field" style="display:none;">
            <label>Cantidad de cuotas</label>
            <input id="m_installments" type="number" min="1" max="120" step="1" value="1" placeholder="1 = pago único">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="field">
            <label>Tenant (opcional)</label>
            <select id="m_tenant">
              <option value="">— Compartido (infra)</option>
              ${tenants.map(t => `<option value="${escapeHtml(t.id)}">${escapeHtml(t.name)}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Mensualizado (preview)</label>
            <input id="m_monthly_preview" type="text" disabled value="—" style="opacity:0.7;">
          </div>
        </div>
        <div class="field">
          <label>Notas (opcional)</label>
          <textarea id="m_notes" placeholder="Detalle, factura, etc."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn" data-modal-action="cancel">Cancelar</button>
          <button class="btn btn-primary-sm" id="m_save">Guardar</button>
        </div>
      `;

      const back = document.createElement('div');
      back.className = 'modal-backdrop';
      back.innerHTML = `<div class="modal">${html}</div>`;
      document.body.appendChild(back);
      const close = () => back.remove();
      back.addEventListener('click', (e) => {
        if (e.target === back) close();
        if (e.target.matches('[data-modal-action="cancel"]')) close();
      });
      setTimeout(() => back.querySelector('#m_label')?.focus(), 50);

      // Show/hide the installments field + live monthly preview
      const periodEl = back.querySelector('#m_period');
      const installmentsField = back.querySelector('#m_installments_field');
      const installmentsEl = back.querySelector('#m_installments');
      const amountEl = back.querySelector('#m_amount');
      const previewEl = back.querySelector('#m_monthly_preview');

      function updateModalPreview() {
        const period = periodEl.value;
        installmentsField.style.display = (period === 'one-time') ? '' : 'none';
        const amount = parseFloat(amountEl.value) || 0;
        let monthly = 0;
        if (period === 'monthly') monthly = amount;
        else if (period === 'yearly') monthly = amount / 12;
        else if (period === 'one-time') {
          const n = Math.max(1, parseInt(installmentsEl.value, 10) || 1);
          monthly = amount / n;
        }
        if (period === 'one-time' && (parseInt(installmentsEl.value, 10) || 1) === 1) {
          previewEl.value = `$${amount.toFixed(2)} (mes 1 solamente)`;
        } else {
          previewEl.value = monthly > 0 ? `$${monthly.toFixed(2)} / mes` : '—';
        }
      }
      periodEl.addEventListener('change', updateModalPreview);
      installmentsEl.addEventListener('input', updateModalPreview);
      amountEl.addEventListener('input', updateModalPreview);
      updateModalPreview();

      back.querySelector('#m_save').addEventListener('click', async () => {
        const period = periodEl.value;
        const installments = period === 'one-time'
          ? Math.max(1, parseInt(installmentsEl.value, 10) || 1)
          : 1;
        const payload = {
          label: back.querySelector('#m_label').value.trim(),
          provider: back.querySelector('#m_provider').value,
          amount_usd: parseFloat(amountEl.value),
          billing_period: period,
          installments,
          period_start: back.querySelector('#m_start').value,
          period_end: back.querySelector('#m_end').value || null,
          tenant_id: back.querySelector('#m_tenant').value || null,
          notes: back.querySelector('#m_notes').value.trim() || null,
        };
        if (!payload.label) return toast('Falta el concepto', 'error');
        if (!(payload.amount_usd >= 0)) return toast('Monto inválido', 'error');
        if (!payload.period_start) return toast('Falta el inicio de período', 'error');

        const btn = back.querySelector('#m_save');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        const { ok, data } = await api('/api/tower/costs', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        btn.disabled = false;
        btn.textContent = 'Guardar';
        if (!ok || !data?.ok) {
          toast(data?.error || 'No se pudo guardar', 'error');
          return;
        }
        toast('Costo agregado', 'success');
        close();
        loadCostsTable();
      });
    }

    // ---------- Boot ----------
    // Nudge once on initial load so iOS PWA picks up safe-area-insets
    // before we toggle any full-viewport elements.
    if (document.readyState === 'complete') nudgeViewport();
    else window.addEventListener('load', nudgeViewport, { once: true });

    checkSession();
  })();
  </script>
</body>
</html>
