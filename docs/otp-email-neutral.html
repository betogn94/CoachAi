<!-- ============================================================
     PLANTILLA NEUTRA DEL MAIL DE CÓDIGO (OTP) — Supabase Auth
     ============================================================
     Dónde se pega: supabase.com/dashboard → proyecto CoachAI →
     Authentication → Email Templates → pestañas "Magic Link" Y
     "Confirm signup" (Supabase usa una u otra según si el email ya
     existe en auth.users — actualizar LAS DOS con este mismo HTML).

     sin abrir el mail — menos fricción en el login)

     Por qué neutra: la plantilla es UNA para todo el proyecto (la

<div style="background:#f6f6f8;padding:32px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

    <div style="font-size:40px;font-weight:800;letter-spacing:10px;color:#16161f;margin-bottom:26px;">{{ .Token }}</div>

</div>
