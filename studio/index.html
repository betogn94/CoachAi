  // ---- Actividad en la app ----
  // Compact stats card: how this clienta is using the product. Source is
  // the existing usuarios.session_count + last_active fields the main app
  // already maintains via the heartbeat. Days-active is derived from
  // created_at → today; avg sessions/day = session_count / days-active.
  function renderActividadCard(u) {
    const sessionCount = u?.session_count || 0;
    const createdAt = u?.created_at ? new Date(u.created_at) : null;
    const lastActive = u?.last_active ? new Date(u.last_active) : null;
    const daysSinceJoined = createdAt ? Math.max(1, Math.floor((Date.now() - createdAt.getTime()) / 86400000)) : 1;
    const avgPerDay = (sessionCount / daysSinceJoined);
    const avgLabel = avgPerDay >= 1 ? avgPerDay.toFixed(1) : avgPerDay.toFixed(2);
    return `<div class="activity-grid">
      <div class="activity-stat">
        <div class="label">Sesiones</div>
        <div class="value lg">${fmtInt(sessionCount)}</div>
        <div class="sub">desde que arrancó</div>
      </div>
      <div class="activity-stat">
        <div class="label">Promedio</div>
        <div class="value lg">${avgLabel}<span style="font-size:11px; color:var(--text-dim); margin-left:4px;">/día</span></div>
        <div class="sub">${daysSinceJoined} ${daysSinceJoined === 1 ? 'día' : 'días'} en la app</div>
      </div>
      <div class="activity-stat">
        <div class="label">Última actividad</div>
        <div class="value">${lastActive ? esc(fmtRelative(u.last_active)) : '—'}</div>
        <div class="sub">${lastActive ? lastActive.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' }) : 'nunca abrió'}</div>
      </div>
      <div class="activity-stat">
        <div class="label">Onboarding</div>
        <div class="value">${createdAt ? esc(fmtRelative(u.created_at)) : '—'}</div>
        <div class="sub">${createdAt ? createdAt.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' }) : '—'}</div>
      </div>
    </div>`;
  }

  function renderDatosPersonales(c) {
    // Privacy-conscious: we deliberately skip peso/altura/cuello/cintura/cadera.
    // The coach sees objetivo/nivel/dias to evaluate plan fit, not body data.
    const SEXO_LABEL    = { femenino: 'Femenino', masculino: 'Masculino', otro: 'Otro' };
    const OBJETIVO_LABEL = { definir: '🔥 Definir', volumen: '💪 Volumen', ganar_musculo: '💪 Ganar músculo', mantener: '⚖️ Mantener', mantenimiento: '⚖️ Mantenimiento' };
    const NIVEL_LABEL    = { principiante: 'Principiante', intermedio: 'Intermedio', avanzado: 'Avanzado' };
    const LUGAR_LABEL    = { gym: 'Gimnasio', casa: 'En casa', mixto: 'Mixto' };
    const ACTIVIDAD_LABEL = { sedentario: 'Sedentario', ligero: 'Ligero', moderado: 'Moderado', activo: 'Activo' };
    const DIA_LABEL = { lun: 'Lun', mar: 'Mar', mie: 'Mié', jue: 'Jue', vie: 'Vie', sab: 'Sáb', dom: 'Dom' };
    const dias = Array.isArray(c.dias_entreno) && c.dias_entreno.length
      ? c.dias_entreno.map(d => DIA_LABEL[d] || d).join(', ')
      : null;
    const dimOrVal = (label, v) => `<dt>${label}</dt>` + (v ? `<dd>${esc(v)}</dd>` : `<dd class="dim">—</dd>`);
    return `<dl class="kv-grid">
      ${dimOrVal('Sexo',       SEXO_LABEL[c.sexo] || c.sexo)}
      ${dimOrVal('Edad',       c.edad ? c.edad + ' años' : null)}
      ${dimOrVal('Objetivo',   OBJETIVO_LABEL[c.objetivo] || c.objetivo)}
      ${dimOrVal('Nivel',      NIVEL_LABEL[c.nivel] || c.nivel)}
      ${dimOrVal('Días',       dias)}
      ${dimOrVal('Duración',   c.duracion_sesion ? c.duracion_sesion + ' min' : null)}
      ${dimOrVal('Lugar',      LUGAR_LABEL[c.lugar_entreno] || c.lugar_entreno)}
      ${dimOrVal('Actividad',  ACTIVIDAD_LABEL[c.actividad] || c.actividad)}
      ${dimOrVal('Comidas/día', c.comidas_dia)}
      ${dimOrVal('Restricciones', Array.isArray(c.restricciones_dieta) && c.restricciones_dieta.length ? c.restricciones_dieta.join(', ') : null)}
      ${dimOrVal('Alergias',   Array.isArray(c.alergias) && c.alergias.length ? c.alergias.join(', ') : null)}
      ${dimOrVal('Lesiones',   Array.isArray(c.lesiones) && c.lesiones.length ? c.lesiones.join(', ') : null)}
      ${dimOrVal('No le gusta', c.no_le_gusta)}
      ${dimOrVal('Teléfono',   c.telefono)}
    </dl>`;
  }

  // The `contenido` field of planes_semanales is a markdown string the coach
  // writes; parseMacrosFromMarkdown only reads macros from an explicit daily
  // target header — the exact same line shape the main app's
  // parseDietaContenido looks for: "Target: 2380 kcal/día | P:135g C:280g G:78g".
  // Per-meal macros (e.g. "Desayuno: ... — 590 kcal · P:35g") are NEVER used
  // — pulling those would mislead the coach into reading one meal's grams
  // as the daily target. If there's no Target line we return null and the
  // chip row is skipped.
  function parseMacrosFromMarkdown(md) {
    if (!md || typeof md !== 'string') return null;
    // Only look at lines that contain a Target marker. Take the first one
    // (additional Targets would be duplicates from older weeks).
    const targetLine = md.split('\n').find(l => /Target\s*:\s*\d/i.test(l));
    if (!targetLine) return null;
    const grab = (re) => { const m = targetLine.match(re); return m ? Number(m[1]) : null; };
    const kcal  = grab(/Target\s*:\s*(\d+)\s*kcal/i);
    const prot  = grab(/\bP\s*:\s*(\d+)\s*g/i);
    const hc    = grab(/\bC\s*:\s*(\d+)\s*g/i); // C = Carbos (main app convention)
    const grasa = grab(/\bG\s*:\s*(\d+)\s*g/i);
    if (kcal == null && prot == null && grasa == null && hc == null) return null;
    return { kcal, prot, grasa, hc };
  }

  // Heuristic that mirrors the main app's parseDietaContenido: a real dieta
  // has at least one of (a) a "Target: Xkcal …" header line, (b) a day
  // header like "LUNES"/"MARTES"/... at the start of a line, or (c) a
  // recognized meal prefix ("Desayuno:", "Almuerzo:", "Cena:", etc.). When
  // none are present, the contenido is just the AI's chat preamble and
  // there's no plan to show — we surface that state explicitly so Beto
  // doesn't think we're hiding something.
  function isStructuredDieta(text) {
    if (!text || typeof text !== 'string') return false;
    if (/Target\s*:\s*\d/i.test(text)) return true;
    if (/^(LUNES|MARTES|MI[EÉ]RCOLES|JUEVES|VIERNES|S[AÁ]BADO|DOMINGO)\b/im.test(text)) return true;
    if (/^(Desayuno|Almuerzo|Merienda|Cena|Colaci[oó]n|Snack|Pre[\s-]*entreno|Post[\s-]*entreno)\s*:/im.test(text)) return true;
    return false;
  }

  // SVG chevron used by every collapsible toggle button. Inline string so we
  // don't have to import an icon library.
  const CHEV_DOWN_SVG = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';

  // Pull a 2-line preview of a markdown plan — used as the collapsed-state
  // teaser so the coach gets a hint of content without expanding.
  function previewLines(md, n = 2) {
    if (!md) return '';
    return md.split('\n').filter(l => l.trim()).slice(0, n).join(' · ');
  }

  function paintDieta(planes) {
    const dietaPlan = planes.find(p => p.tipo === 'dieta');
    const sec = document.getElementById('cli-dieta');
    if (!sec) return;
    if (!dietaPlan) {
      sec.innerHTML = `<div class="detail-section-title">Dieta activa <span class="meta">sin plan</span></div>
        <div class="empty-row">Todavía no tiene dieta cargada.</div>`;
      return;
    }
    // Chat-style (no Target line, no day headers, no meal prefixes) — not
    // a real dieta. Show empty state + collapsible chat msg for context.
    if (!isStructuredDieta(dietaPlan.contenido)) {
      sec.innerHTML = `
        <div class="detail-section-title">Dieta activa <span class="meta">sin estructura</span></div>
        <div class="empty-row" style="margin-bottom:12px;">
          Este cliente no tiene una dieta estructurada cargada — solo hay el resumen del chat inicial.
        </div>
        <details style="font-size:12.5px;">
          <summary style="cursor:pointer; color:var(--text-muted); font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; padding:6px 0;">
            Ver mensaje del chat
          </summary>
          <div class="markdown-body" style="margin-top:8px; max-height:200px; opacity:0.8;">${esc(dietaPlan.contenido || '')}</div>
        </details>`;
      return;
    }
    const macros = parseMacrosFromMarkdown(dietaPlan.contenido);
    const macroHtml = macros ? `
      <div class="macro-row">
        ${macros.kcal != null  ? `<div class="macro-chip"><div class="macro-label">Kcal</div><div class="macro-value">${fmtInt(macros.kcal)}</div></div>` : ''}
        ${macros.prot != null  ? `<div class="macro-chip"><div class="macro-label">Prot</div><div class="macro-value">${fmtInt(macros.prot)}g</div></div>` : ''}
        ${macros.grasa != null ? `<div class="macro-chip"><div class="macro-label">Grasa</div><div class="macro-value">${fmtInt(macros.grasa)}g</div></div>` : ''}
        ${macros.hc != null    ? `<div class="macro-chip"><div class="macro-label">Hidr.</div><div class="macro-value">${fmtInt(macros.hc)}g</div></div>` : ''}
      </div>
    ` : '';
    // Lightweight summary of what's inside (number of days the dieta covers).
    const dayCount = countDays(dietaPlan.contenido);
    sec.classList.add('collapsible');
    sec.innerHTML = `
      <div class="detail-section-title">Dieta activa
        <span class="meta">${esc(dietaPlan.semana_iso || '')} · entregada ${fmtRelative(dietaPlan.fecha_entrega || dietaPlan.updated_at)}</span>
      </div>
      ${macroHtml}
      ${dayCount > 0 ? `<div class="summary-stats"><span class="pill"><strong>${dayCount}</strong> días</span></div>` : ''}
      <div class="collapsible-preview">${esc(previewLines(dietaPlan.contenido))}</div>
      <div class="collapsible-body"><div class="markdown-body" style="max-height:none;">${esc(dietaPlan.contenido || '')}</div></div>
      <div class="collapsible-toggle-row">
        <button class="collapsible-toggle" type="button">${CHEV_DOWN_SVG}<span class="toggle-label">Ver completa</span></button>
      </div>
    `;
  }

  function paintRutina(planes) {
    const rutinaPlan = planes.find(p => p.tipo === 'rutina');
    const sec = document.getElementById('cli-rutina');
    if (!sec) return;
    if (!rutinaPlan) {
      sec.innerHTML = `<div class="detail-section-title">Rutina activa <span class="meta">sin plan</span></div>
        <div class="empty-row">Todavía no tiene rutina cargada.</div>`;
      return;
    }
    // Heuristic counts: # of training days (LUNES/MARTES/... headers) and
    // approx # of exercises (lines that look like "Exercise — N series x N reps").
    const dayCount = countDays(rutinaPlan.contenido);
    const exerciseCount = countExercises(rutinaPlan.contenido);
    sec.classList.add('collapsible');
    sec.innerHTML = `
      <div class="detail-section-title">Rutina activa
        <span class="meta">${esc(rutinaPlan.semana_iso || '')} · entregada ${fmtRelative(rutinaPlan.fecha_entrega || rutinaPlan.updated_at)}</span>
      </div>
      <div class="summary-stats">
        ${dayCount > 0 ? `<span class="pill"><strong>${dayCount}</strong> días</span>` : ''}
        ${exerciseCount > 0 ? `<span class="pill"><strong>${exerciseCount}</strong> ejercicios</span>` : ''}
      </div>
      <div class="collapsible-preview">${esc(previewLines(rutinaPlan.contenido))}</div>
      <div class="collapsible-body"><div class="markdown-body" style="max-height:none;">${esc(rutinaPlan.contenido || '')}</div></div>
      <div class="collapsible-toggle-row">
        <button class="collapsible-toggle" type="button">${CHEV_DOWN_SVG}<span class="toggle-label">Ver completa</span></button>
      </div>
    `;
  }

  function countDays(md) {
    if (!md) return 0;
    const matches = md.match(/^(LUNES|MARTES|MI[EÉ]RCOLES|JUEVES|VIERNES|S[AÁ]BADO|DOMINGO)\b/gim);
    return matches ? new Set(matches.map(m => m.toUpperCase())).size : 0;
  }
  function countExercises(md) {
    if (!md) return 0;
    // Match lines that include "X series x Y reps" — the standard format
    // coaches write exercise prescriptions in.
    const re = /\d+\s*series?\s*x\s*\d+/gi;
    const matches = md.match(re);
    return matches ? matches.length : 0;
  }

  function paintAnalisis(cierre) {
    const sec = document.getElementById('cli-analisis');
    if (!sec) return;
    if (!cierre) {
      sec.innerHTML = `<div class="detail-section-title">Último análisis semanal <span class="meta">sin cierres</span></div>
        <div class="empty-row">Todavía no cerró ninguna semana — el análisis aparece después del primer cierre.</div>`;
      return;
    }
    const stats = cierre.stats || {};
    // Stats shape varies week-to-week; we render whatever keys came back as
    // chips, and the full prose análisis (if present) as the body.
    const statsHtml = Object.keys(stats).length
      ? `<div class="macro-row">${Object.entries(stats).map(([k, v]) => `
          <div class="macro-chip"><div class="macro-label">${esc(k)}</div><div class="macro-value">${esc(typeof v === 'number' ? fmtInt(v) : String(v))}</div></div>
        `).join('')}</div>` : '';
    const prose = cierre.analisis || cierre.resumen || cierre.observaciones || '';
    sec.innerHTML = `
      <div class="detail-section-title">Último análisis semanal
        <span class="meta">Semana ${esc(cierre.semana_num || '?')} · ${fmtRelative(cierre.fecha_fin || cierre.created_at)}</span>
      </div>
      ${statsHtml}
      ${prose ? `<div class="markdown-body">${esc(prose)}</div>` : '<div class="empty-row">Cierre sin texto de análisis.</div>'}
    `;
  }

  function paintBugs(bugs) {
    const sec = document.getElementById('cli-bugs');
    if (!sec) return;
    sec.innerHTML = `
      <div class="detail-section-title">Bugs reportados <span class="meta">${bugs.length} total</span></div>
      ${bugs.length === 0
        ? '<div class="empty-row">Sin bugs reportados. 🎉</div>'
        : `<div class="timeline">${bugs.map(b => `
            <div class="timeline-item bug">
              <span class="when">${esc(fmtRelative(b.created_at))}</span>
              <span class="what">${esc(b.mensaje || '(sin mensaje)')}</span>
            </div>
          `).join('')}</div>`
      }
    `;
  }

  // ---- Views: INVITAR ----
  // Form to invite a new clienta to the current tenant. Mirrors the legacy
  // admin panel's beta_invitados insert + /api/send-invite POST, but the
  // tenant_slug is implicit (= currentTenant.slug) — an admin can only
  // invite into their own tenant, never another coach's.
  function renderInvitar(el) {
    el.innerHTML = `
      <div class="page-header">
        <div>
          <h1 class="page-title">Invitar cliente</h1>
          <p class="page-sub">Sumá un cliente nuevo a <strong>${esc(currentTenant.name)}</strong>. Le llega un mail con el link para entrar.</p>
        </div>
      </div>
      <form id="inviteForm" class="form-card" autocomplete="off" novalidate>
        <div class="form-row">
          <label class="form-label" for="inv-email">Email <span class="req">*</span></label>
          <input class="form-input" type="email" id="inv-email" placeholder="cliente@ejemplo.com" required autocomplete="off" inputmode="email">
        </div>
        <div class="form-row">
          <label class="form-label" for="inv-nombre">Nombre <span class="optional">(opcional, pero recomendado)</span></label>
          <input class="form-input" type="text" id="inv-nombre" placeholder="Mariana" maxlength="60" autocomplete="off">
          <div class="form-hint">Lo usamos para personalizar el mail de invitación.</div>
        </div>
        <div class="form-row">
          <label class="form-toggle">
            <input type="checkbox" id="inv-migrada">
            <div class="form-toggle-label">
              Tiene plan previo para precargar
              <span class="desc">Si ya tenía rutina y/o dieta antes, las precargamos para que las vea al entrar.</span>
            </div>
          </label>
        </div>
        <div id="inv-migrada-fields" style="display:none">
          <div class="form-row">
            <label class="form-label" for="inv-pre-rutina">Rutina existente <span class="optional">(opcional)</span></label>
            <textarea class="form-textarea" id="inv-pre-rutina" placeholder="Pegá acá la rutina actual del cliente (markdown libre)…"></textarea>
          </div>
          <div class="form-row">
            <label class="form-label" for="inv-pre-dieta">Dieta existente <span class="optional">(opcional)</span></label>
            <textarea class="form-textarea" id="inv-pre-dieta" placeholder="Pegá acá la dieta actual (markdown libre)…"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="inv-submit">Invitar</button>
          <span class="form-msg" id="inv-msg"></span>
        </div>
      </form>
    `;
    // Toggle migrada fields
    const migrada = document.getElementById('inv-migrada');
    const migFields = document.getElementById('inv-migrada-fields');
    migrada.addEventListener('change', () => {
      migFields.style.display = migrada.checked ? 'block' : 'none';
    });
    // Submit
    document.getElementById('inviteForm').addEventListener('submit', handleInviteSubmit);
  }

  async function handleInviteSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('inv-submit');
    const msg = document.getElementById('inv-msg');
    const email   = (document.getElementById('inv-email').value || '').trim().toLowerCase();
    const nombre  = (document.getElementById('inv-nombre').value || '').trim();
    const isMig   = document.getElementById('inv-migrada').checked;
    const preRut  = isMig ? (document.getElementById('inv-pre-rutina').value || '').trim() : '';
    const preDie  = isMig ? (document.getElementById('inv-pre-dieta').value || '').trim() : '';

    msg.textContent = '';
    msg.className = 'form-msg';

    if (!email || !email.includes('@') || email.length < 4) {
      msg.textContent = 'Ingresá un email válido.';
      msg.className = 'form-msg err';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Invitando…';

    try {
      // Insert into beta_invitados. The DB has a UNIQUE(email) constraint
      // (legacy from when beta was single-tenant) — duplicates surface as
      // Postgres error code 23505.
      const invitadoPor = currentUser?.email || 'admin';
      const { error } = await sb.from('beta_invitados').insert([{
        email,
        nombre: nombre || null,
        invitado_por: invitadoPor,
        tenant_slug: currentTenant.slug,
        // migrada_de_coach left null: with per-tenant Studio, the inviting
        // coach is implied by tenant_slug. The column stays for legacy data
        // but Studio never writes it.
        migrada_de_coach: null,
        pre_rutina: preRut || null,
        pre_dieta:  preDie || null,
      }]);
      if (error) {
        if (error.code === '23505') {
          msg.textContent = 'Ese email ya estaba invitado.';
        } else {
          msg.textContent = 'No se pudo invitar: ' + error.message;
        }
        msg.className = 'form-msg err';
        return;
      }

      // DB write succeeded — fire the courtesy email. Same endpoint the
      // legacy admin uses; failure here is non-fatal (the invite already
      // exists in DB and the link works as soon as she opens it).
      let mailStatus = '';
      try {
        const resp = await fetch('/api/send-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, nombre: nombre || null, invitadoPor, tenantSlug: currentTenant.slug })
        });
        if (resp.ok) mailStatus = ' · mail enviado 📬';
        else {
          console.warn('[studio] invite mail failed', resp.status);
          mailStatus = ' · mail no se pudo enviar (avisale vos)';
        }
      } catch (mailErr) {
        console.warn('[studio] invite mail network error', mailErr);
        mailStatus = ' · mail no se pudo enviar (avisale vos)';
      }

      msg.textContent = `✓ ${email} invitado${mailStatus}`;
      msg.className = 'form-msg ok';

      // Reset form so the coach can immediately invite the next clienta.
      document.getElementById('inviteForm').reset();
      document.getElementById('inv-migrada-fields').style.display = 'none';

      // Bust the clientas cache so the new invite shows up next time the
      // coach navigates to /clientas.
      _clientasCache = null;
    } catch (err) {
      console.error('[studio] invite error:', err);
      msg.textContent = 'Error inesperado. Probá de nuevo.';
      msg.className = 'form-msg err';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Invitar';
    }
  }

  // ---- Boot ----
  runAuthGate();
  </script>
</body>
</html>
